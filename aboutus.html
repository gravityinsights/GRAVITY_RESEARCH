<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Clock | gRaviTy Research</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            
            /* --- PREVENT TEXT SELECTION --- */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            /* Prevents the "I-beam" cursor on text */
            cursor: default;
        }

        /* --- AMBIENT BACKGROUND --- */
        .gold-orb { 
            position: fixed; 
            border-radius: 50%; 
            filter: blur(140px); 
            pointer-events: none; 
            z-index: 1; 
            opacity: 0.15; 
        }
        .orb1 { width: 600px; height: 600px; background: var(--gold); top: -20%; left: -10%; }
        .orb2 { width: 500px; height: 500px; background: var(--gold); bottom: -10%; right: -10%; }

        /* --- MINIMALIST CLOCK --- */
        .clock-container {
            text-align: center;
            z-index: 10;
        }

        .launch-label {
            font-size: 12px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 30px;
            font-weight: 300;
            opacity: 0.7;
            display: block;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; letter-spacing: 25px; }
            to { opacity: 0.7; letter-spacing: 12px; }
        }

        .timer-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(10px, 4vw, 40px);
            font-size: clamp(60px, 18vw, 180px);
            font-weight: 100;
            color: var(--gold);
            line-height: 1;
            letter-spacing: -5px;
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 0px transparent; opacity: 0.8; }
            50% { text-shadow: 0 0 30px rgba(212, 175, 55, 0.4); opacity: 1; }
        }

        .timer-label {
            font-size: 9px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 20px;
            font-weight: 600;
            transform: translateX(2.5px);
        }

        .separator {
            opacity: 0.2;
            font-weight: 100;
            padding-bottom: 45px;
        }

        /* --- NAVIGATION --- */
        .footer-nav {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            opacity: 0.4;
            transition: 0.3s;
        }

        .footer-nav:hover { opacity: 1; }

        .back-link {
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-link:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;"> 

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="clock-container">
    <span class="launch-label">Time to Launch</span>
    
    <div class="timer-display">
        <div class="timer-unit">
            <span id="days">00</span>
            <span class="timer-label">Days</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="hours">00</span>
            <span class="timer-label">Hours</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="minutes">00</span>
            <span class="timer-label">Minutes</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="seconds">00</span>
            <span class="timer-label">Seconds</span>
        </div>
    </div>
</div>

<div class="footer-nav">
    <a href="index.html" class="back-link">Return to Home</a>
</div>

<script>
    const target = new Date("2026-04-25T00:00:00+05:30").getTime();

    function updateClock() {
        const now = new Date().getTime();
        const diff = target - now;

        if (diff <= 0) {
            document.querySelector(".timer-display").innerHTML = "LIVE";
            return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        const dEl = document.getElementById("days");
        const hEl = document.getElementById("hours");
        const mEl = document.getElementById("minutes");
        const sEl = document.getElementById("seconds");

        if(dEl) dEl.innerText = d.toString().padStart(2, '0');
        if(hEl) hEl.innerText = h.toString().padStart(2, '0');
        if(mEl) mEl.innerText = m.toString().padStart(2, '0');
        if(sEl) sEl.innerText = s.toString().padStart(2, '0');
    }

    setInterval(updateClock, 1000);
    updateClock();

    // PREVENT SOURCE VIEW / INSPECT
    document.onkeydown = function(e) {
        // Blocks F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S
        if (
            e.keyCode === 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
            (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))
        ) {
            return false;
        }
    };
</script>
</body>
</html>
