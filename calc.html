<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.98);
    backdrop-filter: blur(20px);
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
    overflow-x: hidden; /* CRITICAL: Prevents text showing when closed */
    border-right: 0px solid var(--gold);
}
.sidebar.open { 
    width: 280px; 
    border-right: 1px solid #222;
}

.sidebar-content { 
    width: 280px; /* Keeps content width stable during slide */
    padding: 0 30px; 
}

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
}
.sidebar a:hover {
    color: var(--gold);
    padding-left: 10px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.menu-icon {
    cursor: pointer;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
    font-size: 2.5rem;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

.card h3 {
    margin-top: 0;
    color: #eee;
    font-weight: 400;
}

label {
    display: block;
    font-size: 10px;
    color: #666;
    margin-top: 10px;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 5px;
    font-size: 16px;
    outline: none;
}

input:focus {
    border-bottom: 1px solid var(--gold);
}

.result {
    margin-top: 20px;
    font-size: 24px;
    color: var(--gold);
    font-weight: 600;
}

.btn {
    margin-top: 40px;
    padding: 12px 24px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--gold);
    color: black;
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
    <span class="close-btn" onclick="closeMenu()">&times;</span>
    <div class="sidebar-content">
        <div class="menu-label">Advanced Tools</div>
        <a href="calc.html">Wealth Calculators</a>
        <a href="clock.html">Market Clock</a>

        <div class="menu-label">Our Firm</div>
        <a href="aboutus.html">About Us</a>
        <a href="vision.html">Our Vision</a>
    </div>
</div>

<div class="nav">
    <div class="menu-icon" onclick="openMenu()">
        <span></span><span></span><span></span>
    </div>
    <div style="color: var(--gold); font-weight: bold; cursor: pointer;" onclick="goHome()">gRaviTy</div>
</div>

<div class="container">

    <h1>Wealth Calculators</h1>

    <div class="card">
        <h3>Wealth Projection</h3>
        <label>Principal Amount</label>
        <input id="p" type="number" value="100000" oninput="calc()">
        <label>Monthly Addition</label>
        <input id="m" type="number" value="10000" oninput="calc()">
        <label>Expected Return (%)</label>
        <input id="r" type="number" value="12" oninput="calc()">
        <label>Years</label>
        <input id="y" type="number" value="10" oninput="calc()">
        <div id="res1" class="result">₹ 0</div>
    </div>

    <div class="card">
        <h3>SIP</h3>
        <label>Monthly SIP</label>
        <input id="sip" type="number" value="5000" oninput="calcSIP()">
        <label>Expected Return (%)</label>
        <input id="sipr" type="number" value="12" oninput="calcSIP()">
        <label>Years</label>
        <input id="sipy" type="number" value="10" oninput="calcSIP()">
        <div id="res2" class="result">₹ 0</div>
    </div>

    <div class="card">
        <h3>Inflation</h3>
        <label>Target Amount</label>
        <input id="fv" type="number" value="1000000" oninput="calcInflation()">
        <label>Inflation Rate (%)</label>
        <input id="inf" type="number" value="6" oninput="calcInflation()">
        <label>Years</label>
        <input id="infy" type="number" value="10" oninput="calcInflation()">
        <div id="res3" class="result">₹ 0</div>
    </div>

    <button class="btn" onclick="goHome()">← Back Home</button>

</div>

<script>
// SIDEBAR LOGIC
function openMenu(){
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu(){
    document.getElementById("sidebar").classList.remove("open");
}

// Close when clicking outside
document.addEventListener("click", function(e){
    let sb = document.getElementById("sidebar");
    let menuIcon = document.querySelector(".menu-icon");
    if(!sb.contains(e.target) && !menuIcon.contains(e.target) && sb.classList.contains("open")){
        closeMenu();
    }
});

function goHome(){
    alert("Redirecting to home...");
    // window.location.href="index.html";
}

// CALCULATORS - Using proper DOM selection
function calc(){
    const pVal = +document.getElementById("p").value || 0;
    const mVal = +document.getElementById("m").value || 0;
    const rVal = (+document.getElementById("r").value || 0) / 100 / 12;
    const tVal = (+document.getElementById("y").value || 0) * 12;
    
    let val = rVal === 0 ? pVal + mVal * tVal : pVal * Math.pow(1 + rVal, tVal) + mVal * ((Math.pow(1 + rVal, tVal) - 1) / rVal) * (1 + rVal);
    document.getElementById("res1").innerText = "₹ " + Math.round(val).toLocaleString("en-IN");
}

function calcSIP(){
    const mVal = +document.getElementById("sip").value || 0;
    const rVal = (+document.getElementById("sipr").value || 0) / 100 / 12;
    const tVal = (+document.getElementById("sipy").value || 0) * 12;
    
    let val = rVal === 0 ? mVal * tVal : mVal * ((Math.pow(1 + rVal, tVal) - 1) / rVal) * (1 + rVal);
    document.getElementById("res2").innerText = "₹ " + Math.round(val).toLocaleString("en-IN");
}

function calcInflation(){
    const target = +document.getElementById("fv").value || 0;
    const rate = +document.getElementById("inf").value || 0;
    const years = +document.getElementById("infy").value || 0;
    
    let val = target / Math.pow(1 + (rate / 100), years);
    document.getElementById("res3").innerText = "₹ " + Math.round(val).toLocaleString("en-IN");
}

// Initial Run
calc(); 
calcSIP(); 
calcInflation();
</script>

</body>
</html>
