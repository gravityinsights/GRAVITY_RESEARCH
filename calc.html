@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
    --error: #ff4d4d;
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* ================= CUSTOM SCROLLBAR ================= */
::-webkit-scrollbar {
    width: 12px;
}
::-webkit-scrollbar-track {
    background: var(--bg);
    border-left: 1px solid rgba(212, 175, 55, 0.1);
}
::-webkit-scrollbar-thumb {
    background: #0a0a0a; 
    border: 1px solid var(--gold); 
    border-radius: 0; 
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(212, 175, 55, 0.15); 
}
html {
    scrollbar-width: thin;
    scrollbar-color: var(--gold) var(--bg);
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s ease-in-out;
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR ================= */
* {
    cursor: none !important;
}

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--gold);
    transition: width 0.2s ease, height 0.2s ease, box-shadow 0.2s ease;
}

.cursor-dot.hover-state {
    width: 12px;
    height: 12px;
    box-shadow: 0 0 15px var(--gold);
}

/* ================= OVERLAY ================= */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s ease;
    z-index: 1500;
}

.overlay.show {
    opacity: 1;
    pointer-events: all;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 280px;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    box-shadow: 2px 0 25px rgba(0,0,0,0.8);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    padding-top: 100px;
    z-index: 2000;
    overflow-x: hidden;
    border-right: 1px solid rgba(212, 175, 55, 0.2);
}

.sidebar.open { 
    transform: translateX(0);
}

.sidebar-content {

}

.menu-label {

.sidebar a {

    align-items: center;
    padding: 12px 0;
    color: #888;
    text-decoration: none;

    font-size: 15px;

/* --- ACTIVE LINK STYLES --- */

.active-dot {

/* ================= NAV & MENU ICON ================= */

input {

/* ================= DYNAMIC SVG CHART STYLES ================= */
.chart-container {
    width: 100%;
    height: 60px;
    margin-top: 25px;

    cursor: none; /* Keep cursor hidden over the chart */
}

/* Prevent stroke distortion on resize */
.chart-container path,
.chart-container line,
.chart-container circle {
    vector-effect: non-scaling-stroke;
}

.chart-container path.curve {
    fill: none;
    stroke: var(--gold);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: d 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); 
    filter: drop-shadow(0 4px 6px rgba(212, 175, 55, 0.3));
}

/* ================= CHART TOOLTIP ================= */
.chart-tooltip {
    position: fixed;
    background: rgba(10, 10, 10, 0.95);
    border: 1px solid rgba(212, 175, 55, 0.5);
    padding: 10px 15px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.1s ease;
    z-index: 9999;
    backdrop-filter: blur(8px);
    transform: translate(-50%, -140%);
    box-shadow: 0 8px 25px rgba(0,0,0,0.8);
}
.chart-tooltip::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 6px 6px 0;
    border-style: solid;
    border-color: rgba(212, 175, 55, 0.5) transparent transparent transparent;
}
.chart-tooltip .year {
    color: #888;

    margin-bottom: 4px;

}
.chart-tooltip .val {

    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
}

/* ================= DESKTOP HOVER PROTECTIONS ================= */
@media (hover: hover) and (pointer: fine) {
    .sidebar a:hover {

        transform: translateX(6px);

    .home-btn:hover {

        color: var(--bg);

    }

    .home-btn:hover::before {
        transform: translateX(-4px);
    }

}

/* ================= MOBILE RESPONSIVENESS ================= */
@media screen and (max-width: 768px) {
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
    
    .sidebar { width: 85%; }
    .nav { padding: 15px 20px; }
    .container { margin-top: 80px; }
    .chart-tooltip { display: none !important; } /* Hide hover tooltip on touch devices */
}

</style>

<script>

/* ================= KEYBOARD SHORTCUT PROTECTION ================= */
document.addEventListener('keydown', function(e) {
    if (e.key === "Escape" && document.getElementById("sidebar").classList.contains("open")) {
        toggleMenu();
        return;
    }
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
        (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) ||
        (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0))) {
        e.preventDefault();
        return false;
    }
});

/* ================= TOUCH DETECTION (MOBILE FIXES) ================= */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* ================= CUSTOM CURSOR LOGIC ================= */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
    });

    const interactables = document.querySelectorAll('a, button, input, .menu-icon');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* ================= MENU LOGIC ================= */
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuIcon = document.querySelector(".menu-icon");
    const body = document.body;

    const isOpen = sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
    menuIcon.classList.toggle("active");

    body.style.overflow = isOpen ? "hidden" : "";
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
function transitionTo(url) {
    document.body.classList.add('fade-out');
    setTimeout(() => {
        window.location.href = url;
    }, 400);
}

document.addEventListener("DOMContentLoaded", () => {
    const links = document.querySelectorAll('a[href]');
    links.forEach(link => {
        link.addEventListener('click', function(e) {
            const target = this.getAttribute('href');
            if (target && !target.startsWith('http') && !target.startsWith('mailto')) {
                e.preventDefault();
                transitionTo(target);
            }
        });
    });
});

window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
        document.body.classList.remove('fade-out');
    }
});

/* ================= CALCULATOR ENGINE & ANIMATION ================= */
const formatter = new Intl.NumberFormat('en-IN', {
    style: 'currency',
    currency: 'INR',
    maximumFractionDigits: 0
});

const animationState = {};

function animateValue(objId, endVal) {
    const obj = document.getElementById(objId);
    let startVal = parseFloat(obj.getAttribute("data-val")) || 0;
    
    if (startVal === endVal) return;
    
    obj.setAttribute("data-val", endVal);
    let startTime = null;
    const duration = 500; 

    if (animationState[objId]) cancelAnimationFrame(animationState[objId]);

    const step = (timestamp) => {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        
        const easeOut = progress * (2 - progress);
        const currentVal = startVal + (endVal - startVal) * easeOut;

        obj.innerHTML = formatter.format(currentVal);

        if (progress < 1) {
            animationState[objId] = requestAnimationFrame(step);
        } else {
            obj.innerHTML = formatter.format(endVal);
        }
    };
    animationState[objId] = requestAnimationFrame(step);
}

function getValidFloat(id) {
    const el = document.getElementById(id);
    const val = parseFloat(el.value);
    
    if (isNaN(val) || val < 0) {
        el.classList.add('error');
        return null;
    } else {
        el.classList.remove('error');
        return val;
    }
}

/* ================= DATA PLOTTING LOGIC ================= */
function generatePathData(p, m, r, durationYears, pathId, svgId) {
    const path = document.getElementById(pathId);
    const svg = document.getElementById(svgId);
    if (!path || !svg) return;
    
    const steps = 50; 
    const i = r / 12 / 100;
    const totalMonths = durationYears * 12;
    let data = [];

    // Calculate curve points
    for (let step = 0; step <= steps; step++) {
        let currentMonth = (step / steps) * totalMonths;
        let val = p * Math.pow(1 + i, currentMonth);
        if (i > 0) {
            val += m * ((Math.pow(1 + i, currentMonth) - 1) / i) * (1 + i);
        } else {
            val += m * currentMonth;
        }
        data.push(val);
    }

    const maxVal = data[steps] || 1; 

    // Store data inside the SVG element for the hover interaction to read
    svg.chartData = data;
    svg.chartMaxVal = maxVal;
    svg.chartDuration = durationYears;

    // Build SVG path string
    let d = "";
    for (let j = 0; j <= steps; j++) {
        let cx = (j / steps) * 100;
        let cy = 40 - ((data[j] / maxVal) * 40); 
        d += (j === 0 ? "M " : " L ") + cx.toFixed(2) + " " + cy.toFixed(2);
    }
    
    path.setAttribute("d", d);
}

/* ================= INTERACTION ENGINE ================= */
function setupChartInteraction(svgId, trackerId, pointId) {
    if (isTouchDevice) return; // Disables complex hover on mobile to prevent jank
    
    const svg = document.getElementById(svgId);
    const tracker = document.getElementById(trackerId);
    const point = document.getElementById(pointId);
    const tooltip = document.getElementById('chart-tooltip');

    svg.addEventListener('mousemove', (e) => {
        if (!svg.chartData) return;

        const rect = svg.getBoundingClientRect();
        
        // Find relative X position (0 to 1)
        let x = e.clientX - rect.left;
        let percentX = Math.max(0, Math.min(1, x / rect.width));

        const steps = 50;
        let index = Math.round(percentX * steps);
        let val = svg.chartData[index];

        // Map back to SVG coordinates (ViewBox is 100x40)
        let svgX = (index / steps) * 100;
        let svgY = 40 - ((val / svg.chartMaxVal) * 40);

        // Move Line & Point
        tracker.setAttribute('x1', svgX);
        tracker.setAttribute('x2', svgX);
        tracker.style.opacity = '1';

        point.setAttribute('cx', svgX);
        point.setAttribute('cy', svgY);
        point.style.opacity = '1';

        // Calculate Year
        let currentYear = (index / steps) * svg.chartDuration;
        let yearText = currentYear === 0 ? "Initial" : "Year " + currentYear.toFixed(1);

        // Update Tooltip
        tooltip.innerHTML = `<div class="year">${yearText}</div><div class="val">${formatter.format(Math.round(val))}</div>`;
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
        tooltip.style.opacity = '1';
    });

    svg.addEventListener('mouseleave', () => {
        tracker.style.opacity = '0';
        point.style.opacity = '0';
        tooltip.style.opacity = '0';
    });
}


/* ================= CALCULATION CALLS ================= */
function calcWealth() {
    let p = getValidFloat('p');
    let m = getValidFloat('m');
    let r = getValidFloat('r');
    let y = getValidFloat('y');

    if (p === null || m === null || r === null || y === null) {
        animateValue('res1', 0); return;
    }

    let i = r / 12 / 100;
    let n = y * 12;
    let fv = p * Math.pow(1 + i, n);
    
    if (i > 0) {
        fv += m * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
    } else {
        fv += m * n;
    }
    animateValue('res1', Math.round(fv));
    
    generatePathData(p, m, r, y, 'path-wealth', 'svg-wealth');
}

function calcSIP() {
    let sip = getValidFloat('sip');
    let r = getValidFloat('sipr');
    let y = getValidFloat('sipy');

    if (sip === null || r === null || y === null) {
        animateValue('res2', 0); return;
    }

    let i = r / 12 / 100;
    let n = y * 12;
    let fv = 0;
    
    if (i > 0) {
        fv = sip * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
    } else {
        fv = sip * n;
    }
    animateValue('res2', Math.round(fv));
    
    generatePathData(0, sip, r, y, 'path-sip', 'svg-sip');
}

function calcInflation() {
    let fv = getValidFloat('fv');
    let inf = getValidFloat('inf');
    let y = getValidFloat('infy');

    if (fv === null || inf === null || y === null) {
        animateValue('res3', 0); return;
    }

    let r = inf / 100;
    let cost = fv * Math.pow(1 + r, y);
    animateValue('res3', Math.round(cost));
}

// Initial Calculations on Load
calcWealth();
calcSIP();
calcInflation();

// Initialize Interactivity
setupChartInteraction('svg-wealth', 'tracker-wealth', 'point-wealth');
setupChartInteraction('svg-sip', 'tracker-sip', 'point-sip');

</script>
