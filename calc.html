<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    opacity: 0.15;
}
.orb1 { width:400px;height:400px;background:var(--gold);top:-10%;left:-10%; }
.orb2 { width:300px;height:300px;background:var(--gold);bottom:-5%;right:-5%; }

body > * { position: relative; z-index: 1; }

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

label {
    font-size: 10px;
    color: #777;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 15px;
}

.result {
    margin-top: 15px;
    font-size: 22px;
    color: var(--gold);
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 10px 20px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
}
.btn:hover {
    background: var(--gold);
    color: black;
}
</style>
</head>

<body>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="container">

<h1>Wealth Calculators</h1>

<!-- MAIN CALC -->
<div class="card">
<h3>Wealth Projection</h3>

<label>Initial Investment</label>
<input id="p" type="number" value="100000" oninput="calc()">

<label>Monthly Investment</label>
<input id="m" type="number" value="10000" oninput="calc()">

<label>Return %</label>
<input id="r" type="number" value="12" oninput="calc()">

<label>Years</label>
<input id="y" type="number" value="10" oninput="calc()">

<div class="result" id="res1">₹ 0</div>
</div>

<!-- SIP ONLY -->
<div class="card">
<h3>SIP Future Value</h3>

<label>Monthly SIP</label>
<input id="sip" type="number" value="5000" oninput="calcSIP()">

<label>Return %</label>
<input id="sipr" type="number" value="12" oninput="calcSIP()">

<label>Years</label>
<input id="sipy" type="number" value="10" oninput="calcSIP()">

<div class="result" id="res2">₹ 0</div>
</div>

<!-- INFLATION -->
<div class="card">
<h3>Inflation Adjusted Value</h3>

<label>Future Value</label>
<input id="fv" type="number" value="1000000" oninput="calcInflation()">

<label>Inflation %</label>
<input id="inf" type="number" value="6" oninput="calcInflation()">

<label>Years</label>
<input id="infy" type="number" value="10" oninput="calcInflation()">

<div class="result" id="res3">₹ 0</div>
</div>

<button class="btn" onclick="goHome()">← Back Home</button>

</div>

<script>

// MAIN CALC
function calc(){
let P=+p.value, M=+m.value, r=(+r1=r.value)/100/12, t=y.value*12;
let val=P*Math.pow(1+r,t)+M*((Math.pow(1+r,t)-1)/r)*(1+r);
res1.innerText="₹ "+val.toLocaleString("en-IN");
}

// SIP
function calcSIP(){
let M=+sip.value, r=(+sipr.value)/100/12, t=sipy.value*12;
let val=M*((Math.pow(1+r,t)-1)/r)*(1+r);
res2.innerText="₹ "+val.toLocaleString("en-IN");
}

// INFLATION
function calcInflation(){
let fv=+fv.value, r=+inf.value/100, t=+infy.value;
let val=fv/Math.pow(1+r,t);
res3.innerText="₹ "+val.toLocaleString("en-IN");
}

function goHome(){
window.location.href="index.html";
}

calc(); calcSIP(); calcInflation();

</script>

</body>
</html>
