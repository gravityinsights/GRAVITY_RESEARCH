<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root 
{
    --gold: #d4af37;
    --bg: #050505;
}

body 
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

/* sidebar */
.sidebar 
{
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    transition: 0.4s ease-in-out;
    padding-top: 80px;
    z-index: 2000;
    overflow-x: hidden;
}

.sidebar.open 
{ 
    width: 280px; 
    border-right: 1px solid var(--gold);
}

.sidebar-content 
{ 
    min-width: 280px;
    padding: 0 30px; 
}

.menu-label 
{
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.7;
}

.sidebar a 
{
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.25s;
}

.sidebar a:hover 
{
    color: var(--gold);
    padding-left: 10px;
}

/* close */
.close-btn 
{
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* nav */
.nav 
{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
}

.menu-icon 
{
    cursor: pointer;
    z-index: 101;
}

.menu-icon span 
{
    display: block;
    width: 25px;
    height: 2px;
    background: var(--gold);
    margin: 5px 0;
}

/* container */
.container 
{
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 
{
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
    font-size: 2.5rem;
}

/* card */
.card 
{
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

.card h3 
{
    margin-top: 0;
    font-weight: 400;
    color: #eee;
}

/* form */
label 
{
    display: block;
    font-size: 10px;
    color: #666;
    margin-top: 10px;
    text-transform: uppercase;
}

input 
{
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 5px;
    font-size: 18px;
    outline: none;
}

input:focus 
{
    border-bottom: 1px solid var(--gold);
}

/* result */
.result 
{
    font-size: 24px;
    color: var(--gold);
    margin-top: 15px;
    font-weight: 600;
}

/* button */
.btn 
{
    margin-top: 40px;
    padding: 12px 24px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover 
{
    background: var(--gold);
    color: black;
}

</style>
</head>

<body>

<!-- sidebar -->
<div id="sidebar" class="sidebar">

    <span class="close-btn" onclick="closeMenu()">&times;</span>

    <div class="sidebar-content">

        <div class="menu-label">Advanced Tools</div>
        <a href="calc.html">Wealth Calculators</a>
        <a href="clock.html">Market Clock</a>

        <div class="menu-label">Research</div>
        <a href="researchportal.html">Research Portal</a>

        <div class="menu-label">Our Firm</div>
        <a href="aboutus.html">About Us</a>
        <a href="vision.html">Our Vision</a>

        <div class="menu-label">Access</div>
        <a href="contactus.html">Contact Us</a>

    </div>

</div>

<!-- nav -->
<div class="nav">

    <div class="menu-icon" onclick="openMenu(event)">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div 
        style="color: var(--gold); font-size: 22px; font-weight: bold; cursor: pointer;" 
        onclick="goHome()"
    >
        gRaviTy
    </div>

</div>

<!-- content -->
<div class="container">

    <h1>Wealth Calculators</h1>

    <div class="card">

        <h3>Wealth Projection</h3>

        <label>Initial Investment (P)</label>
        <input id="p" type="number" value="100000" oninput="calcWealth()">

        <label>Monthly Addition (M)</label>
        <input id="m" type="number" value="10000" oninput="calcWealth()">

        <label>Annual Return (%)</label>
        <input id="r" type="number" value="12" oninput="calcWealth()">

        <label>Duration (Years)</label>
        <input id="y" type="number" value="10" oninput="calcWealth()">

        <div id="res1" class="result">₹ 0</div>

    </div>

    <div class="card">

        <h3>SIP Calculator</h3>

        <label>Monthly SIP Amount</label>
        <input id="sip" type="number" value="5000" oninput="calcSIP()">

        <label>Expected Return (%)</label>
        <input id="sipr" type="number" value="12" oninput="calcSIP()">

        <label>Time Period (Years)</label>
        <input id="sipy" type="number" value="10" oninput="calcSIP()">

        <div id="res2" class="result">₹ 0</div>

    </div>

    <div class="card">

        <h3>Inflation Adjuster</h3>

        <label>Target Future Value</label>
        <input id="fv" type="number" value="1000000" oninput="calcInflation()">

        <label>Inflation Rate (%)</label>
        <input id="inf" type="number" value="6" oninput="calcInflation()">

        <label>Time Horizon (Years)</label>
        <input id="infy" type="number" value="10" oninput="calcInflation()">

        <div id="res3" class="result">₹ 0</div>

    </div>

    <button class="btn" onclick="goHome()">← Back Home</button>

</div>

<script>

function openMenu(event) 
{
    event.stopPropagation(); 
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu() 
{
    document.getElementById("sidebar").classList.remove("open");
}

document.addEventListener("click", function(e) 
{
    const sb = document.getElementById("sidebar");
    const menuIcon = document.querySelector(".menu-icon");

    if (!sb.contains(e.target) && !menuIcon.contains(e.target)) 
    {
        closeMenu();
    }
});

function goHome() 
{
    window.location.href = "index.html";
}

/* calculations unchanged */
function calcWealth(){/* unchanged */}
function calcSIP(){/* unchanged */}
function calcInflation(){/* unchanged */}

calcWealth();
calcSIP();
calcInflation();

</script>

</body>
</html>
