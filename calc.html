<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="73132b12-a822-434c-8854-888438105660"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Tools | gRaviTy Research</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#050505">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@100;300;400;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg: #050505;
            --error: #ff4d4d;
        }

        /* ================= BASE STYLES ================= */
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }

        /* ================= COLD AF SCROLLBAR ================= */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: #0a0a0a; border: 1px solid var(--gold);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* ================= CUSTOM CURSOR ================= */
        * { cursor: none !important; }
        .cursor-dot {
            width: 6px; height: 6px; background: var(--gold); position: fixed;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s;
        }
        .cursor-dot.hover-state { width: 12px; height: 12px; box-shadow: 0 0 15px var(--gold); }

        /* ================= NAV & SIDEBAR ================= */
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; position: fixed; width: 100%; box-sizing: border-box;
            top: 0; background: rgba(5,5,5,0.85); backdrop-filter: blur(12px);
            z-index: 2500; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); text-decoration: none; letter-spacing: 3px; }
        
        .sidebar {
            width: 280px; height: 100%; position: fixed; left: 0; top: 0; background: #0a0a0a;
            z-index: 2000; border-right: 1px solid rgba(212, 175, 55, 0.2);
            transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: 100px;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar a { display: block; padding: 12px 30px; color: #888; text-decoration: none; transition: 0.3s; }
        .sidebar a.active-link { color: var(--gold); }
        .menu-icon { cursor: pointer; z-index: 2501; width: 30px; display: flex; flex-direction: column; gap: 6px; }
        .menu-icon span { width: 100%; height: 2px; background: var(--gold); transition: 0.4s; }

        /* ================= CARDS & INPUTS ================= */
        .container { max-width: 650px; margin: 120px auto 80px; padding: 0 20px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; font-size: 2.5rem; }
        
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 30px; margin-top: 30px; border-radius: 12px; position: relative;
        }
        label { display: block; font-size: 10px; color: #666; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #333;
            color: var(--gold); padding: 10px 0; font-size: 18px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom: 1px solid var(--gold); }
        .result { font-size: 32px; color: var(--gold); margin-top: 20px; font-family: 'Playfair Display', serif; font-weight: 600; }
        .hint { font-size: 9px; color: var(--gold); opacity: 0.5; margin-top: 5px; display: block; }

        /* ================= INTERACTIVE GRAPH STYLES ================= */
        .graph-wrapper {
            position: relative; width: 100%; height: 150px; margin-top: 30px;
            background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden;
        }
        svg { width: 100%; height: 100%; display: block; }
        
        .chart-line { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; transition: d 0.4s ease; }
        .chart-area { fill: url(#grad); transition: d 0.4s ease; pointer-events: none; }
        
        /* Tooltip & Tracker */
        .tracker-line { stroke: rgba(212, 175, 55, 0.2); stroke-width: 1; visibility: hidden; }
        .tracker-dot { fill: var(--gold); stroke: white; stroke-width: 2; visibility: hidden; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .chart-tooltip {
            position: absolute; pointer-events: none; background: rgba(10,10,10,0.9);
            border: 1px solid var(--gold); padding: 8px 12px; border-radius: 4px;
            font-size: 12px; font-family: 'Inter', sans-serif; visibility: hidden;
            z-index: 100; backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .chart-tooltip b { color: var(--gold); display: block; font-size: 14px; }

        /* ================= DESKTOP HOVER ================= */
        @media (hover: hover) and (pointer: fine) {
            .card:hover { border-color: rgba(212, 175, 55, 0.3); }
        }

        @media screen and (max-width: 768px) {
            .nav { padding: 15px 20px; }
            .sidebar { width: 85%; }
            .cursor-dot { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>

<body oncontextmenu="return false;">

<div class="cursor-dot" id="cursor-dot"></div>

<div class="nav">
    <div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <a href="index.html" class="logo-text">gRaviTy</a>
</div>

<div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="calc.html" class="active-link">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>
</div>

<div class="container">
    <h1>Wealth Intelligence</h1>

    <div class="card" id="card1">
        <h3>Wealth Projection</h3>
        <label>Initial Investment</label>
        <input id="p" type="number" min="0" value="100000" oninput="runCalculators()">
        <label>Monthly Addition</label>
        <input id="m" type="number" min="0" value="10000" oninput="runCalculators()">
        <label>Annual Return (%)</label>
        <input id="r" type="number" min="0" value="12" oninput="runCalculators()">
        <label>Duration (Years)</label>
        <input id="y" type="number" min="0" value="15" oninput="runCalculators()">
        
        <div id="res1" class="result">₹ 0</div>

        <div class="graph-wrapper" onmousemove="handleHover(event, 'chart1')" onmouseleave="hideTooltip('chart1')">
            <div id="tip1" class="chart-tooltip"></div>
            <svg id="chart1" viewBox="0 0 1000 200" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--gold);stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:var(--gold);stop-opacity:0" />
                    </linearGradient>
                </defs>
                <path class="chart-area" id="area1" d="" />
                <path class="chart-line" id="line1" d="" />
                <line class="tracker-line" id="trace1" x1="0" y1="0" x2="0" y2="200" />
                <circle class="tracker-dot" id="dot1" r="6" cx="0" cy="0" />
            </svg>
        </div>
    </div>

    <div class="card" id="card2">
        <h3>SIP Intelligence</h3>
        <label>Monthly SIP</label>
        <input id="sip" type="number" min="0" value="5000" oninput="runCalculators()">
        <label>Expected Return (%)</label>
        <input id="sipr" type="number" min="0" value="12" oninput="runCalculators()">
        <label>Time Period (Years)</label>
        <input id="sipy" type="number" min="0" value="20" oninput="runCalculators()">
        
        <div id="res2" class="result">₹ 0</div>

        <div class="graph-wrapper" onmousemove="handleHover(event, 'chart2')" onmouseleave="hideTooltip('chart2')">
            <div id="tip2" class="chart-tooltip"></div>
            <svg id="chart2" viewBox="0 0 1000 200" preserveAspectRatio="none">
                <path class="chart-area" id="area2" d="" />
                <path class="chart-line" id="line2" d="" />
                <line class="tracker-line" id="trace2" x1="0" y1="0" x2="0" y2="200" />
                <circle class="tracker-dot" id="dot2" r="6" cx="0" cy="0" />
            </svg>
        </div>
    </div>

    <div class="card" id="card3">
        <h3>Inflation Adjuster</h3>
        <label>Current Value</label>
        <input id="fv" type="number" min="0" value="1000000" oninput="runCalculators()">
        <label>Inflation Rate (%)</label>
        <input id="inf" type="number" min="0" value="6" oninput="runCalculators()">
        <span class="hint">Target India Inflation: ~6.0%</span>
        <label>Time Horizon (Years)</label>
        <input id="infy" type="number" min="0" value="10" oninput="runCalculators()">
        
        <div id="res3" class="result">₹ 0</div>

        <div class="graph-wrapper" onmousemove="handleHover(event, 'chart3')" onmouseleave="hideTooltip('chart3')">
            <div id="tip3" class="chart-tooltip"></div>
            <svg id="chart3" viewBox="0 0 1000 200" preserveAspectRatio="none">
                <path class="chart-area" id="area3" d="" />
                <path class="chart-line" id="line3" d="" />
                <line class="tracker-line" id="trace3" x1="0" y1="0" x2="0" y2="200" />
                <circle class="tracker-dot" id="dot3" r="6" cx="0" cy="0" />
            </svg>
        </div>
    </div>
</div>

<script>
    const formatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
    let chartData = { chart1: [], chart2: [], chart3: [] };

    /* ================= CORE CALCULATORS ================= */
    function runCalculators() {
        calcWealth();
        calcSIP();
        calcInflation();
    }

    function calcWealth() {
        const p = parseFloat(document.getElementById('p').value) || 0;
        const m = parseFloat(document.getElementById('m').value) || 0;
        const r = parseFloat(document.getElementById('r').value) || 0;
        const y = parseFloat(document.getElementById('y').value) || 0;
        const i = r / 12 / 100;
        let points = [];
        for (let t = 0; t <= y; t++) {
            const n = t * 12;
            const val = p * Math.pow(1 + i, n) + (i > 0 ? m * ((Math.pow(1 + i, n) - 1) / i) * (1 + i) : m * n);
            points.push({ x: t, y: val });
        }
        chartData.chart1 = points;
        draw('chart1', points, 'res1');
    }

    function calcSIP() {
        const sip = parseFloat(document.getElementById('sip').value) || 0;
        const r = parseFloat(document.getElementById('sipr').value) || 0;
        const y = parseFloat(document.getElementById('sipy').value) || 0;
        const i = r / 12 / 100;
        let points = [];
        for (let t = 0; t <= y; t++) {
            const n = t * 12;
            const val = i > 0 ? sip * ((Math.pow(1 + i, n) - 1) / i) * (1 + i) : sip * n;
            points.push({ x: t, y: val });
        }
        chartData.chart2 = points;
        draw('chart2', points, 'res2');
    }

    function calcInflation() {
        const fv = parseFloat(document.getElementById('fv').value) || 0;
        const inf = parseFloat(document.getElementById('inf').value) || 0;
        const y = parseFloat(document.getElementById('infy').value) || 0;
        const r = inf / 100;
        let points = [];
        for (let t = 0; t <= y; t++) {
            const val = fv * Math.pow(1 + r, t);
            points.push({ x: t, y: val });
        }
        chartData.chart3 = points;
        draw('chart3', points, 'res3');
    }

    /* ================= SVG RENDERING ================= */
    function draw(id, points, resId) {
        const line = document.getElementById('line' + id.slice(-1));
        const area = document.getElementById('area' + id.slice(-1));
        const res = document.getElementById(resId);
        
        if (!points.length) return;
        const maxVal = Math.max(...points.map(p => p.y));
        const minVal = Math.min(...points.map(p => p.y));
        const range = maxVal - minVal || 1;

        let pathD = "";
        points.forEach((p, i) => {
            const x = (i / (points.length - 1)) * 1000;
            const y = 180 - ((p.y - minVal) / range * 160);
            pathD += (i === 0 ? "M " : " L ") + x + " " + y;
        });

        line.setAttribute("d", pathD);
        area.setAttribute("d", pathD + " L 1000 200 L 0 200 Z");
        res.innerHTML = formatter.format(points[points.length - 1].y);
    }

    /* ================= INTERACTION LOGIC ================= */
    function handleHover(e, chartId) {
        const svg = document.getElementById(chartId);
        const rect = svg.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const percentX = mouseX / rect.width;
        
        const data = chartData[chartId];
        const index = Math.round(percentX * (data.length - 1));
        const point = data[index];
        
        if (!point) return;

        const idNum = chartId.slice(-1);
        const trace = document.getElementById('trace' + idNum);
        const dot = document.getElementById('dot' + idNum);
        const tip = document.getElementById('tip' + idNum);

        // Position Marker
        const svgX = (index / (data.length - 1)) * 1000;
        const maxVal = Math.max(...data.map(p => p.y));
        const minVal = Math.min(...data.map(p => p.y));
        const svgY = 180 - ((point.y - minVal) / (maxVal - minVal || 1) * 160);

        trace.setAttribute("x1", svgX); trace.setAttribute("x2", svgX);
        dot.setAttribute("cx", svgX); dot.setAttribute("cy", svgY);
        
        trace.style.visibility = "visible";
        dot.style.visibility = "visible";

        // Position Tooltip
        tip.style.visibility = "visible";
        tip.style.left = (percentX * 100) + "%";
        tip.style.top = "10px";
        tip.style.transform = percentX > 0.7 ? "translateX(-110%)" : "translateX(10%)";
        tip.innerHTML = `Year ${point.x}<b>${formatter.format(point.y)}</b>`;
    }

    function hideTooltip(chartId) {
        const idNum = chartId.slice(-1);
        document.getElementById('trace' + idNum).style.visibility = "hidden";
        document.getElementById('dot' + idNum).style.visibility = "hidden";
        document.getElementById('tip' + idNum).style.visibility = "hidden";
    }

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("open");
    }

    // Cursor Movement
    window.addEventListener('mousemove', (e) => {
        const dot = document.getElementById('cursor-dot');
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
    });

    // Initial Run
    runCalculators();
</script>

</body>
</html>
