:root {
    --gold: #d4af37;
    --bg: #050505;
    --error: #ff4d4d;
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s ease-in-out;
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR ================= */
* {
    cursor: none !important;
}

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--gold);
    transition: width 0.2s ease, height 0.2s ease, box-shadow 0.2s ease;
}

.cursor-dot.hover-state {
    width: 12px;
    height: 12px;
    box-shadow: 0 0 15px var(--gold);
}

/* ================= OVERLAY ================= */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s ease;
    z-index: 1500;
}

.overlay.show {
    opacity: 1;
    pointer-events: all;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 280px;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    box-shadow: 2px 0 25px rgba(0,0,0,0.8);

    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);

    z-index: 2000;

}

.sidebar.open {

}

.sidebar-content {

}

.menu-label {

.sidebar a {

    align-items: center;
    padding: 12px 0;

    text-decoration: none;

    font-size: 15px;
}

.sidebar a:hover {
    color: var(--gold);

/* --- ACTIVE LINK STYLES --- */
.sidebar a.active-link {

.active-dot {

    margin-right: 12px;

/* ================= NAV & MENU ICON ================= */
.nav {
    display: flex;

    align-items: center;

.menu-icon {

    height: 24px;

}

.menu-icon span {
    display: block;
    width: 26px;

    background: var(--gold);
    margin: 3px 0;
    transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    transform-origin: left center;
}

.menu-icon.active span:nth-child(1) { transform: rotate(45deg); width: 28px; }
.menu-icon.active span:nth-child(2) { opacity: 0; width: 0; }
.menu-icon.active span:nth-child(3) { transform: rotate(-45deg); width: 28px; }

.logo-text {

    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-decoration: none;
}

/* ================= CONTAINER & CARDS ================= */
.container {
    max-width: 600px;
    margin: 100px auto 80px auto;
    padding: 0 20px;
    position: relative;
    z-index: 10;
}

.home-btn {
    display: inline-flex;

    text-decoration: none;
    font-size: 11px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    margin-bottom: 30px;
    backdrop-filter: blur(4px);
}

.home-btn::before {
    content: '←';
    margin-right: 10px;
    font-size: 14px;
    transition: transform 0.4s ease;
}

.home-btn:hover {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.25);
    transform: translateY(-2px);
}

.home-btn:hover::before {
    transform: translateX(-4px);
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 40px;
}

.card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 30px;
    margin-top: 30px;
    border-radius: 8px;
    transition: border-color 0.3s ease;
}

.card:hover {
    border-color: rgba(212, 175, 55, 0.3);
}

.card h3 {
    margin-top: 0;
    font-weight: 400;
    color: #eee;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 25px;
}

label {
    display: block;
    font-size: 10px;
    color: #888;
    margin-top: 15px;

}

input {
    width: 100%;

    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 10px 0;

    outline: none;
    transition: 0.3s ease;

}

input:focus {
    border-bottom: 1px solid var(--gold);
}

input.error {
    border-bottom: 1px solid var(--error) !important;
    color: var(--error) !important;
}

.result {

}

/* ================= MOBILE RESPONSIVENESS ================= */
@media screen and (max-width: 768px) {

<div class="container">

    <h1>Wealth Calculators</h1>

    <div class="card">
        <h3>Wealth Projection</h3>
        <label>Initial Investment (P)</label>
        <input id="p" type="number" value="100000" oninput="calcWealth()">

        <label>Monthly Addition (M)</label>
        <input id="m" type="number" value="10000" oninput="calcWealth()">

        <label>Annual Return (%)</label>
        <input id="r" type="number" value="12" oninput="calcWealth()">

        <input id="y" type="number" value="10" oninput="calcWealth()">

    <div class="card">

        <input id="fv" type="number" value="1000000" oninput="calcInflation()">

        <label>Inflation Rate (%)</label>
        <input id="inf" type="number" value="6" oninput="calcInflation()">

        <label>Time Horizon (Years)</label>
        <input id="infy" type="number" value="10" oninput="calcInflation()">

        <div id="res3" class="result" data-val="0">₹ 0</div>
    </div>

</div>

<script>

/* ================= KEYBOARD SHORTCUT PROTECTION ================= */
document.addEventListener('keydown', function(e) {
    // Escape key closes menu
    if (e.key === "Escape" && document.getElementById("sidebar").classList.contains("open")) {
        toggleMenu();
        return;
    }
    
    // Dev tools protection
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
        (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) ||
        (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0))) {
        e.preventDefault();
        return false;
    }
});

/* ================= TOUCH DETECTION (MOBILE FIXES) ================= */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* ================= CUSTOM CURSOR LOGIC ================= */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
    });

    const interactables = document.querySelectorAll('a, button, input, .menu-icon');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* ================= MENU LOGIC (UPDATED WITH OVERLAY) ================= */
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuIcon = document.querySelector(".menu-icon");
    const body = document.body;

    const isOpen = sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
    menuIcon.classList.toggle("active");

    // Prevent background scrolling when menu is open
    body.style.overflow = isOpen ? "hidden" : "";
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
function transitionTo(url) {
    document.body.classList.add('fade-out');
    setTimeout(() => {
        window.location.href = url;
    }, 400);
}

document.addEventListener("DOMContentLoaded", () => {
    const links = document.querySelectorAll('a[href]');
    links.forEach(link => {
        link.addEventListener('click', function(e) {
            const target = this.getAttribute('href');
            if (target && !target.startsWith('http') && !target.startsWith('mailto')) {
                e.preventDefault();
                transitionTo(target);
            }
        });
    });
});

window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
        document.body.classList.remove('fade-out');
    }
});

/* ================= CALCULATOR ENGINE & ANIMATION ================= */

const formatter = new Intl.NumberFormat('en-IN', {
    style: 'currency',
    currency: 'INR',
    maximumFractionDigits: 0
});

const animationState = {};

function animateValue(objId, endVal) {
    const obj = document.getElementById(objId);
    let startVal = parseFloat(obj.getAttribute("data-val")) || 0;
    
    if (startVal === endVal) return;
    
    obj.setAttribute("data-val", endVal);
    let startTime = null;
    const duration = 500; 

    if (animationState[objId]) cancelAnimationFrame(animationState[objId]);

    const step = (timestamp) => {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        
        const easeOut = progress * (2 - progress);
        const currentVal = startVal + (endVal - startVal) * easeOut;

        obj.innerHTML = formatter.format(currentVal);

        if (progress < 1) {
            animationState[objId] = requestAnimationFrame(step);
        } else {
            obj.innerHTML = formatter.format(endVal);
        }
    };
    animationState[objId] = requestAnimationFrame(step);
}

function getValidFloat(id) {
    const el = document.getElementById(id);
    const val = parseFloat(el.value);
    
    if (isNaN(val) || val < 0) {
        el.classList.add('error');
        return null;
    } else {
        el.classList.remove('error');
        return val;
    }
}

function calcWealth() {
    let p = getValidFloat('p');
    let m = getValidFloat('m');
    let r = getValidFloat('r');
    let y = getValidFloat('y');

    if (p === null || m === null || r === null || y === null) {
        animateValue('res1', 0); return;
    }

    let i = r / 12 / 100;
    let n = y * 12;
    let fv = p * Math.pow(1 + i, n);
    
    if (i > 0) {
        fv += m * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
    } else {
        fv += m * n;
    }
    animateValue('res1', Math.round(fv));
}

function calcSIP() {
    let sip = getValidFloat('sip');
    let r = getValidFloat('sipr');
    let y = getValidFloat('sipy');

    if (sip === null || r === null || y === null) {
        animateValue('res2', 0); return;
    }

    let i = r / 12 / 100;
    let n = y * 12;
    let fv = 0;
    
    if (i > 0) {
        fv = sip * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
    } else {
        fv = sip * n;
    }
    animateValue('res2', Math.round(fv));
}

function calcInflation() {
    let fv = getValidFloat('fv');
    let inf = getValidFloat('inf');
    let y = getValidFloat('infy');

    if (fv === null || inf === null || y === null) {
        animateValue('res3', 0); return;
    }

    let r = inf / 100;
    let cost = fv * Math.pow(1 + r, y);
    animateValue('res3', Math.round(cost));
}

// Initial Calculations on Load
calcWealth();
calcSIP();
calcInflation();

</script>
