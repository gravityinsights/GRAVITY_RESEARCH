<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(20px);
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
}
.sidebar.open { width: 280px; }

.sidebar-content { padding: 0 30px; }

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
}
.sidebar a:hover {
    color: var(--gold);
    padding-left: 10px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 15px;
}

.result {
    font-size: 22px;
    color: var(--gold);
}

.btn {
    margin-top: 30px;
    padding: 10px 20px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<span class="close-btn" onclick="closeMenu()">&times;</span>

<div class="sidebar-content">
<div class="menu-label">Advanced Tools</div>
<a href="calc.html">Wealth Calculators</a>
<a href="clock.html">Market Clock</a>

<div class="menu-label">Our Firm</div>
<a href="aboutus.html">About Us</a>
<a href="vision.html">Our Vision</a>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="menu-icon" onclick="openMenu()">
<span></span><span></span><span></span>
</div>
<img src="logo.png" height="40" onclick="goHome()">
</div>

<div class="container">

<h1>Wealth Calculators</h1>

<!-- WEALTH -->
<div class="card">
<h3>Wealth Projection</h3>
<input id="p" type="number" value="100000" oninput="calc()">
<input id="m" type="number" value="10000" oninput="calc()">
<input id="r" type="number" value="12" oninput="calc()">
<input id="y" type="number" value="10" oninput="calc()">
<div id="res1" class="result">₹ 0</div>
</div>

<!-- SIP -->
<div class="card">
<h3>SIP</h3>
<input id="sip" type="number" value="5000" oninput="calcSIP()">
<input id="sipr" type="number" value="12" oninput="calcSIP()">
<input id="sipy" type="number" value="10" oninput="calcSIP()">
<div id="res2" class="result">₹ 0</div>
</div>

<!-- INFLATION -->
<div class="card">
<h3>Inflation</h3>
<input id="fv" type="number" value="1000000" oninput="calcInflation()">
<input id="inf" type="number" value="6" oninput="calcInflation()">
<input id="infy" type="number" value="10" oninput="calcInflation()">
<div id="res3" class="result">₹ 0</div>
</div>

<button class="btn" onclick="goHome()">← Back Home</button>

</div>

<script>

// SIDEBAR
function openMenu(){
document.getElementById("sidebar").classList.add("open");
}
function closeMenu(){
document.getElementById("sidebar").classList.remove("open");
}

document.addEventListener("click", function(e){
let sb=document.getElementById("sidebar");
if(!sb.contains(e.target) && !e.target.closest(".menu-icon")){
sb.classList.remove("open");
}
});

// NAV
function goHome(){
window.location.href="index.html";
}

// CALCS
function calc(){
let P=+p.value||0, M=+m.value||0, r=(+r.value||0)/100/12, t=(+y.value||0)*12;
let val = r===0 ? P+M*t : P*Math.pow(1+r,t)+M*((Math.pow(1+r,t)-1)/r)*(1+r);
res1.innerText="₹ "+Math.round(val).toLocaleString("en-IN");
}

function calcSIP(){
let M=+sip.value||0, r=(+sipr.value||0)/100/12, t=(+sipy.value||0)*12;
let val = r===0 ? M*t : M*((Math.pow(1+r,t)-1)/r)*(1+r);
res2.innerText="₹ "+Math.round(val).toLocaleString("en-IN");
}

function calcInflation(){
let val=(+fv.value||0)/Math.pow(1+(+inf.value||0)/100,(+infy.value||0));
res3.innerText="₹ "+Math.round(val).toLocaleString("en-IN");
}

// INIT
calc(); calcSIP(); calcInflation();

</script>

</body>
</html>
