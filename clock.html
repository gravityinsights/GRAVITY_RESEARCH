<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Clock | gRaviTy Research</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root
{
    --gold: #d4af37;
    --bg: #050505;
}

/* base */
body
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* background glow */
body::before
{
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(212,175,55,0.06), transparent 50%);
    z-index: 0;
}

/* NAV */
.nav
{
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5,5,5,0.9);
    backdrop-filter: blur(8px);
    z-index: 1001;
}

.menu-icon
{
    cursor: pointer;
}

.menu-icon span
{
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 5px 0;
}

.logo
{
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar
{
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    overflow-x: hidden;
    transition: 0.3s ease;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar.open { width: 260px; }

.sidebar-content { padding: 0 30px; }

.menu-label
{
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    opacity: 0.6;
}

.sidebar a
{
    display: block;
    padding: 14px 0;
    color: #777;
    text-decoration: none;
    cursor: pointer;
}

.sidebar a:hover { color: var(--gold); }

/* overlay */
.overlay
{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 900;
}

.overlay.show
{
    opacity: 1;
    pointer-events: all;
}

/* MAIN CLOCK */
.container
{
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 80px;
}

/* heading */
.title
{
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--gold);
    margin-bottom: 30px;
    letter-spacing: 1px;
}

/* time */
.clock
{
    font-size: clamp(50px, 10vw, 100px);
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 3px;
}

/* date */
.date
{
    margin-top: 10px;
    color: #888;
    font-size: 14px;
    letter-spacing: 2px;
}

/* market status */
.status
{
    margin-top: 25px;
    padding: 8px 16px;
    border: 1px solid rgba(212,175,55,0.4);
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 2px;
}

/* footer */
.footer
{
    position: absolute;
    bottom: 30px;
}

.footer a
{
    color: white;
    text-decoration: none;
    font-size: 10px;
    border: 1px solid #222;
    padding: 10px 20px;
}

.footer a:hover
{
    border-color: var(--gold);
    color: var(--gold);
}

/* layering */
body > * { position: relative; z-index: 1; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #d4af37; }

html
{
    scrollbar-width: thin;
    scrollbar-color: #d4af37 #000;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-content">

        <div class="menu-label">Navigation</div>
        <a onclick="go('index.html')">Home</a>
        <a onclick="go('researchportal.html')">Research Portal</a>

        <div class="menu-label">Tools</div>
        <a onclick="go('calc.html')">Wealth Calculators</a>

        <div class="menu-label">Firm</div>
        <a onclick="go('aboutus.html')">About Us</a>
        <a onclick="go('vision.html')">Vision</a>

        <div class="menu-label">Connect</div>
        <a onclick="go('contactus.html')">Contact</a>

    </div>

</div>

<!-- NAV -->
<div class="nav">

    <div class="menu-icon" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo" onclick="go('index.html')">
        gRaviTy
    </div>

</div>

<!-- MAIN -->
<div class="container">

    <div class="title">Market Clock</div>

    <div class="clock" id="clock">00:00:00</div>

    <div class="date" id="date"></div>

    <div class="status" id="status">Checking Market...</div>

</div>

<!-- FOOTER -->
<div class="footer">
    <a href="index.html">Return Home</a>
</div>

<script>

/* menu */
function toggleMenu()
{
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* nav */
function go(page)
{
    window.location.href = page;
}

/* clock */
function updateClock()
{
    const now = new Date();

    const hours = String(now.getHours()).padStart(2,'0');
    const minutes = String(now.getMinutes()).padStart(2,'0');
    const seconds = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerText = `${hours}:${minutes}:${seconds}`;

    const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("date").innerText = now.toLocaleDateString('en-IN', options);

    /* market status (India NSE timing) */
    const h = now.getHours();
    const m = now.getMinutes();

    const currentMinutes = h * 60 + m;
    const open = 9 * 60 + 15;
    const close = 15 * 60 + 30;

    if(currentMinutes >= open && currentMinutes <= close)
    {
        document.getElementById("status").innerText = "MARKET OPEN";
    }
    else
    {
        document.getElementById("status").innerText = "MARKET CLOSED";
    }
}

setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
