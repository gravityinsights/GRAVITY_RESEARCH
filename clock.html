<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK_TERMINAL | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            color: #d4af37;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-frame {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 60px;
            position: relative;
            background: rgba(10, 10, 10, 0.5);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .terminal-header {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #030303;
            padding: 0 10px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #666;
        }

        #clock {
            font-size: 110px;
            font-weight: 100;
            color: #ffffff;
            letter-spacing: -5px;
            margin-bottom: 5px;
        }

        .status-line {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 60px;
            color: #d4af37;
            opacity: 0.6;
        }

        .data-grid {
            display: flex;
            gap: 40px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            padding-top: 40px;
        }

        .data-block {
            text-align: left;
        }

        .label {
            display: block;
            font-size: 9px;
            color: #444;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .value {
            font-size: 24px;
            color: #d4af37;
        }

        .launch-meta {
            margin-top: 40px;
            font-size: 10px;
            color: #333;
            text-align: left;
        }

        .back-link {
            position: absolute;
            bottom: -30px;
            right: 0;
            text-decoration: none;
            color: #444;
            font-size: 10px;
            transition: 0.3s;
        }

        .back-link:hover { color: #d4af37; }

        /* Glitch animation for specific elements */
        .glitch { animation: pulse 4s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="terminal-frame">
        <div class="terminal-header">NODE.0425_T0</div>
        
        <div id="clock">00:00:00</div>
        <div class="status-line glitch">SYSTEM_OPERATIONAL // MARKET_SYNC</div>

        <div class="data-grid">
            <div class="data-block">
                <span class="label">T-MINUS_DAYS</span>
                <span class="value" id="days">000</span>
            </div>
            <div class="data-block">
                <span class="label">HOURS</span>
                <span class="value" id="hours">00</span>
            </div>
            <div class="data-block">
                <span class="label">MINUTES</span>
                <span class="value" id="minutes">00</span>
            </div>
            <div class="data-block">
                <span class="label">SECONDS</span>
                <span class="value" id="seconds">00</span>
            </div>
        </div>

        <div class="launch-meta">
            OBJECTIVE: GRAND_LAUNCH<br>
            TARGET_DATE: 25_APRIL_2026<br>
            ENTITY: GRAVITY_RESEARCH
        </div>

        <a href="index.html" class="back-link">RETURN_TO_MAIN_CONSOLE</a>
    </div>

    <script>
        function update() {
            const now = new Date();
            
            // Wall Clock
            document.getElementById('clock').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" +
                now.getMinutes().toString().padStart(2, '0') + ":" +
                now.getSeconds().toString().padStart(2, '0');

            // Launch Countdown
            const target = new Date("April 25, 2026 00:00:00").getTime();
            const diff = target - now.getTime();

            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff / 86400000).toString().padStart(3, '0');
                document.getElementById('hours').textContent = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('minutes').textContent = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('seconds').textContent = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            } else {
                document.querySelector('.data-grid').innerHTML = "<span class='value'>INITIALIZATION_COMPLETE</span>";
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
