<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVITY | CLOCK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700;900&display=swap');

        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.1em;
            overflow: hidden;
        }

        /* High-Impact Gold Gradient */
        .gold-punch {
            background: linear-gradient(180deg, #f9f295 0%, #e0aa3e 45%, #b88a44 70%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Large Clean Clock */
        #clock {
            font-size: clamp(80px, 16vw, 200px);
            margin: 0;
            line-height: 1;
            letter-spacing: -0.02em;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2));
        }

        /* Minimal Status Bar */
        .status-header {
            position: absolute;
            top: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 10px;
            color: #444;
            font-weight: 700;
            letter-spacing: 0.3em;
        }

        .status-header span {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            display: inline-block;
        }

        /* The Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 40px 0;
            opacity: 0.8;
        }

        /* Countdown Grid */
        .countdown-container {
            display: flex;
            gap: 50px;
            text-align: center;
        }

        .unit .value {
            font-size: 28px;
            font-weight: 400;
            color: #fff;
            display: block;
        }

        .unit .label {
            font-size: 9px;
            color: #666;
            font-weight: 700;
            margin-top: 8px;
            letter-spacing: 0.2em;
        }

        /* Footer Branding */
        .launch-tag {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            color: #444;
        }

        .launch-tag span {
            color: #d4af37;
            margin-right: 10px;
        }

        .exit-link {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-decoration: none;
            color: #222;
            font-size: 10px;
            font-weight: 700;
            transition: 0.3s;
        }

        .exit-link:hover {
            color: #d4af37;
        }

        /* Background Visual Depth */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, black 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="status-header">
        <span></span> SYSTEM_OPERATIONAL
    </div>

    <div id="clock" class="gold-punch">00:00:00</div>

    <div class="divider"></div>

    <div class="countdown-container">
        <div class="unit">
            <span class="value" id="days">00</span>
            <span class="label">DAYS</span>
        </div>
        <div class="unit">
            <span class="value" id="hours">00</span>
            <span class="label">HRS</span>
        </div>
        <div class="unit">
            <span class="value" id="minutes">00</span>
            <span class="label">MIN</span>
        </div>
        <div class="unit">
            <span class="value" id="seconds">00</span>
            <span class="label">SEC</span>
        </div>
    </div>

    <div class="launch-tag">
        <span>GRAND LAUNCH</span> GRAVITY RESEARCH | 25.04.2026
    </div>

    <a href="index.html" class="exit-link">TERMINATE_SESSION</a>

    <script>
        function update() {
            const now = new Date();
            
            // Current Time
            document.getElementById('clock').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" +
                now.getMinutes().toString().padStart(2, '0') + ":" +
                now.getSeconds().toString().padStart(2, '0');

            // Countdown Logic
            const target = new Date("April 25, 2026 00:00:00").getTime();
            const diff = target - now.getTime();

            if (diff > 0) {
                // padStart(2, '0') ensures 09 instead of 009
                document.getElementById('days').textContent = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').textContent = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('minutes').textContent = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('seconds').textContent = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
