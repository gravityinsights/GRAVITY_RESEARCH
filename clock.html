<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@100;200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --gold-dim: rgba(212, 175, 55, 0.3);
    --gold-glow: rgba(212, 175, 55, 0.15);
    --bg: #050505;
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR ================= */
* { cursor: none !important; }

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    top: 0;
    left: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%); 
    box-shadow: 0 0 15px var(--gold);
    transition: width 0.3s ease, height 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, border 0.3s ease;
    will-change: transform, width, height;
}

.cursor-dot.hover-state {
    width: 30px;
    height: 30px;
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--gold);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* sidebar */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(3, 3, 3, 0.98);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    padding-top: 100px;
    z-index: 1000;
    border-right: 1px solid rgba(212, 175, 55, 0.15);
}

.sidebar.open { width: 280px; }

.sidebar a {
    display: block;
    padding: 18px 40px;
    color: #999;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.sidebar a:hover { color: var(--gold); padding-left: 50px; }

/* nav */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 40px;
    z-index: 10;
    box-sizing: border-box;
}

.menu-icon { cursor: pointer; }
.menu-icon span {
    display: block;
    width: 22px;
    height: 1px;
    background: var(--gold);
    margin: 6px 0;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    cursor: pointer;
    text-decoration: none;
}

/* orbs (HARDWARE ACCELERATED FOR PC SMOOTHNESS) */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(160px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.12;
    will-change: transform;
}

.orb1 { 
    width: 700px; height: 700px; background: var(--gold); 
    top: -15%; left: -15%;
    animation: move1 28s infinite linear; 
}
.orb2 { 
    width: 600px; height: 600px; background: #fff; 
    bottom: -15%; right: -15%;
    animation: move2 35s infinite linear; 
}

@keyframes move1 { 
    0% { transform: translate3d(0, 0, 0); } 
    50% { transform: translate3d(90vw, 80vh, 0); } 
    100% { transform: translate3d(0, 0, 0); } 
}
@keyframes move2 { 
    0% { transform: translate3d(0, 0, 0); } 
    50% { transform: translate3d(-90vw, -80vh, 0); } 
    100% { transform: translate3d(0, 0, 0); } 
}

/* main container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
    padding: 0 20px;
    box-sizing: border-box;
}

.label {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 10px;
    color: white;
    text-transform: uppercase;
    margin-bottom: 60px;
    opacity: 0.8;
    text-align: center;
}

/* ================= TIMER STYLING ================= */
.timer {
    display: flex;
    align-items: center;
    justify-content: center;
}

.unit-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(212, 175, 55, 0.4);
    backdrop-filter: blur(10px);
    padding: 35px 25px;
    border-radius: 4px;
    min-width: 140px;
    text-align: center;
    transition: transform 0.3s ease, border-color 0.3s ease;
    box-sizing: border-box;
}

.unit-box:hover {
    border-color: var(--gold);
    transform: translateY(-5px);
}

.unit-value {
    font-family: 'Inter', sans-serif;
    font-size: clamp(45px, 8vw, 85px);
    color: var(--gold);
    font-weight: 100;
    line-height: 1;
    letter-spacing: -2px;
}

.unit-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 15px;
}

/* ================= VERTICAL LINES ================= */
.separator {
    width: 1px;
    height: 100px;
    background: var(--gold);
    box-shadow: 0 0 20px var(--gold), 0 0 10px var(--gold);
    margin: 0 40px;
    opacity: 0.7;
    flex-shrink: 0;
}

/* launch text */
.launch-text {
    position: absolute;
    bottom: 120px;
    text-align: center;
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
    color: white;
    padding: 0 20px;
    box-sizing: border-box;
}

.launch-text span { color: var(--gold); }

.footer {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
}

.footer-link {
    color: #666;
    text-decoration: none;
    font-size: 11px;
    border: 1px solid #222;
    padding: 12px 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: 0.3s;
    display: inline-block;
}

.footer-link:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 15px var(--gold-glow);
}

/* ================= MOBILE OPTIMIZATION ================= */
@media screen and (max-width: 768px) {
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
    .sidebar.open { width: 100%; }
    .nav { padding: 20px; }
    
    .label {
        letter-spacing: 6px;
        margin-bottom: 30px;
    }

    .timer {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        width: 100%;
        max-width: 340px;
    }
    
    .separator { display: none; } 
    
    .unit-box { 
        min-width: auto; 
        padding: 20px 10px; 
    }
    
    .unit-value { 
        font-size: clamp(35px, 10vw, 50px); 
    }

    .unit-label {
        letter-spacing: 2px;
        font-size: 9px;
    }

    .launch-text { 
        bottom: 100px; 
        font-size: 13px; 
        line-height: 1.6;
    }
    
    .footer { 
        bottom: 30px; 
    }
}

@media screen and (max-width: 380px) {
    .timer { gap: 10px; }
    .unit-box { padding: 15px 5px; }
    .unit-value { font-size: 32px; }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="cursor-dot" id="cursor-dot"></div>

<div id="sidebar" class="sidebar">
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="vision.html">Our Vision</a>
    <a href="calc.html">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>
    <a href="contactus.html">Contact Us</a>
</div>

<div class="nav">
    <div class="menu-icon" id="menuBtn"><span></span><span></span><span></span></div>
    <a href="index.html" class="logo">gRaviTy</a>
</div>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="container">
    <div class="label">System Launch Imminent</div>

    <div class="timer">
        <div class="unit-box">
            <div id="days" class="unit-value">00</div>
            <div class="unit-label">Days</div>
        </div>
        
        <div class="separator"></div>

        <div class="unit-box">
            <div id="hours" class="unit-value">00</div>
            <div class="unit-label">Hours</div>
        </div>

        <div class="separator"></div>

        <div class="unit-box">
            <div id="minutes" class="unit-value">00</div>
            <div class="unit-label">Minutes</div>
        </div>

        <div class="separator"></div>

        <div class="unit-box">
            <div id="seconds" class="unit-value">00</div>
            <div class="unit-label">Seconds</div>
        </div>
    </div>
</div>

<div class="launch-text">
    PAN INDIA — <span>30 MAY 2026</span>
</div>

<div class="footer">
    <a href="index.html" class="footer-link">Return Home</a>
</div>

<script>
/* PROTECTION SCRIPT */
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

/* TOUCH DETECTION */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* CUSTOM CURSOR - GPU ACCELERATED */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
    });
    
    document.querySelectorAll('a, button, .menu-icon, .logo, .unit-box').forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* MENU */
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
menuBtn.addEventListener("click", (e) => { e.stopPropagation(); sidebar.classList.toggle("open"); });
document.addEventListener("click", () => sidebar.classList.remove("open"));

/* SEAMLESS PAGE TRANSITIONS */
// We select ALL anchor tags that have an href attribute. 
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('click', function(e) {
            const targetUrl = this.getAttribute('href');
            
            // Only run the transition if it's an internal link (not an external website or email)
            if (targetUrl && !targetUrl.startsWith('http') && !targetUrl.startsWith('mailto')) {
                e.preventDefault(); // Stop immediate jump
                document.body.classList.add('fade-out'); // Trigger CSS fade
                
                // Wait for the CSS transition (400ms) then force the browser to redirect
                setTimeout(() => { 
                    window.location.assign(targetUrl); 
                }, 400);
            }
        });
    });
});

window.addEventListener('pageshow', (event) => {
    if (event.persisted) document.body.classList.remove('fade-out');
});

/* TIMER LOGIC - UPDATED TO APRIL 25, 2026 */
const target = new Date("2026-04-25T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;

    if(diff <= 0) {
        document.querySelector(".container").innerHTML = "<div class='unit-value' style='letter-spacing: 10px;'>SYSTEM LIVE</div>";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = d < 10 ? "0" + d : d;
    document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
    document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
    document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
