<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@100;200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --gold-dim: rgba(212, 175, 55, 0.3);
    --gold-glow: rgba(212, 175, 55, 0.1);
    --bg: #050505;
    --selection: rgba(212, 175, 55, 0.15);
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

::selection { background: var(--selection); color: var(--gold); }
::-moz-selection { background: var(--selection); color: var(--gold); }

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR ================= */
* { cursor: none !important; }

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--gold);
    transition: width 0.3s ease, height 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
}

.cursor-dot.hover-state {
    width: 30px;
    height: 30px;
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--gold);
    box-shadow: 0 0 20px var(--gold-glow);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* sidebar */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(3, 3, 3, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    padding-top: 100px;
    z-index: 1000;
    border-right: 1px solid rgba(212, 175, 55, 0.15);
}

.sidebar.open { width: 280px; }

.sidebar a {
    display: block;
    padding: 18px 40px;
    color: #999;
    text-decoration: none;
    letter-spacing: 1px;
    font-size: 14px;
    font-weight: 300;
    transition: 0.3s;
    position: relative;
}

.sidebar a::before {
    content: '';
    position: absolute;
    left: 25px;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 1px;
    background: var(--gold);
    transition: 0.3s;
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 50px;
}

.sidebar a:hover::before {
    width: 15px;
}

.menu-label {
    padding: 25px 40px 10px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
}

/* nav */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 40px;
    z-index: 10;
    box-sizing: border-box;
}

.menu-icon { cursor: pointer; padding: 10px; margin:-10px; }

.menu-icon span {
    display: block;
    width: 22px;
    height: 1px;
    background: var(--gold);
    margin: 6px 0;
    transition: 0.3s;
}

.menu-icon:hover span:nth-child(2) { transform: translateX(4px); }

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
}

.logo::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
}

/* orbs */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(160px);
    -webkit-filter: blur(160px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.12;
}

.orb1 { width: 700px; height: 700px; background: var(--gold); animation: move1 28s infinite linear; }
.orb2 { width: 600px; height: 600px; background: #fff; animation: move2 35s infinite linear; }

@keyframes move1 { 0% { top: -15%; left: -15%; } 50% { top: 65%; left: 75%; } 100% { top: -15%; left: -15%; } }
@keyframes move2 { 0% { bottom: -15%; right: -15%; } 50% { bottom: 65%; right: 75%; } 100% { bottom: -15%; right: -15%; } }

/* main container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
    padding-bottom: 5vh;
}

.label {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 10px;
    color: white;
    text-transform: uppercase;
    margin-bottom: 50px;
    opacity: 0.9;
    position: relative;
}

.label::after {
    content: '';
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 1px;
    background: var(--gold);
}

/* ================= TIMER STYLING ================= */
.timer {
    display: flex;
    align-items: center;
    justify-content: center;
}

.unit-box {
    position: relative;
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 30px 20px;
    border-radius: 8px;
    min-width: 130px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, border-color 0.3s ease;
}

.unit-box:hover {
    border-color: rgba(212, 175, 55, 0.3);
    transform: translateY(-5px);
}

.unit-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 8px;
    background: radial-gradient(circle at center, var(--gold-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.unit-box:hover::before { opacity: 1; }

.unit-value {
    font-family: 'Inter', sans-serif;
    font-size: clamp(45px, 8vw, 85px);
    color: var(--gold);
    font-weight: 100; 
    line-height: 1;
    letter-spacing: -2px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 15px var(--gold-glow);
}

.unit-label {
    font-size: 10px;
    font-weight: 400;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 15px;
    position: relative;
    z-index: 1;
}

/* ================= VERTICAL LINES (FIXED & HIGHLY VISIBLE) ================= */
.separator {
    width: 2px;
    height: 80px; 
    background: linear-gradient(to bottom, transparent 0%, var(--gold) 50%, transparent 100%);
    box-shadow: 0 0 15px var(--gold);
    margin: 0 25px; /* Adds space between the boxes and the line */
    opacity: 0.8;
}

/* launch text */
.launch-text {
    position: absolute;
    bottom: 120px;
    text-align: center;
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 5px;
    color: white;
    opacity: 0.7;
}

.launch-text span { color: var(--gold); }

.footer {
    position: absolute;
    bottom: 50px;
}

.footer-link {
    color: #666;
    text-decoration: none;
    font-size: 11px;
    font-weight: 300;
    border: 1px solid #222;
    padding: 12px 30px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.footer-link:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 15px var(--gold-glow);
    transform: translateY(-2px);
}

/* ================= MOBILE RESPONSIVENESS ================= */
@media screen and (max-width: 768px) {
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
    .sidebar.open { width: 100%; }
    
    .nav { padding: 20px; }
    .logo { font-size: 18px; }

    .container { padding-bottom: 10vh; }
    .label { letter-spacing: 6px; font-size: 10px; }

    .timer {
        gap: 10px;
        flex-wrap: wrap;
        max-width: 300px;
    }
    
    .unit-box {
        padding: 20px 10px;
        min-width: 120px; 
        backdrop-filter: blur(10px);
    }
    
    /* Hide vertical lines on mobile so boxes stack nicely */
    .separator { display: none; }
    
    .unit-value { font-size: 40px; letter-spacing: -1px; }
    .unit-label { font-size: 9px; letter-spacing: 3px; margin-top: 10px; }

    .launch-text { font-size: 12px; letter-spacing: 3px; bottom: 130px; }
    .footer-link { padding: 10px 20px; font-size: 10px; }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="cursor-dot" id="cursor-dot"></div>

<div id="sidebar" class="sidebar">
    <div class="menu-label">Navigation</div>
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="vision.html">Our Vision</a>
    <div class="menu-label">Intelligence</div>
    <a href="calc.html">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>
    <a href="contactus.html">Contact Us</a>
</div>

<div class="nav">
    <div class="menu-icon" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="logo" onclick="goHome()">gRaviTy</div>
</div>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="container">
    <div class="label">System Launch Imminent</div>

    <div class="timer">
        <div class="unit-box">
            <div id="days" class="unit-value">00</div>
            <div class="unit-label">Days</div>
        </div>
        
        <div class="separator"></div>

        <div class="unit-box">
            <div id="hours" class="unit-value">00</div>
            <div class="unit-label">Hours</div>
        </div>

        <div class="separator"></div>

        <div class="unit-box">
            <div id="minutes" class="unit-value">00</div>
            <div class="unit-label">Minutes</div>
        </div>

        <div class="separator"></div>

        <div class="unit-box">
            <div id="seconds" class="unit-value">00</div>
            <div class="unit-label">Seconds</div>
        </div>
    </div>
</div>

<div class="launch-text">
    PAN INDIA — <span>30 MAY 2026</span>
</div>

<div class="footer">
    <a href="index.html" class="footer-link">Return Home</a>
</div>

<script>
/* PROTECTION SCRIPT */
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

/* TOUCH DETECTION */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* CUSTOM CURSOR */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
    });
    
    const interactables = document.querySelectorAll('a, button, .menu-icon, .logo, .unit-box, input');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* MENU */
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
menuBtn.addEventListener("click", (e) => { e.stopPropagation(); sidebar.classList.toggle("open"); });
document.addEventListener("click", () => sidebar.classList.remove("open"));
sidebar.addEventListener("click", (e) => { e.stopPropagation(); });

/* SEAMLESS PAGE TRANSITIONS */
function transitionTo(url) {
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = url; }, 400);
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('click', function(e) {
            const target = this.getAttribute('href');
            if (target && !target.startsWith('http') && !target.startsWith('mailto') && !target.startsWith('#')) {
                e.preventDefault();
                transitionTo(target);
            }
        });
    });
});

window.addEventListener('pageshow', (event) => {
    if (event.persisted) {
        document.body.classList.remove('fade-out');
    }
});

function goHome() { transitionTo('index.html'); }

/* TIMER LOGIC */
const target = new Date("2026-05-30T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;

    if(diff <= 0) {
        document.querySelector(".container").innerHTML = "<div class='unit-value' style='font-size: clamp(30px, 5vw, 60px); letter-spacing: 10px; font-weight:300;'>SYSTEM LIVE</div>";
        document.querySelector(".launch-text").style.display = 'none';
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = d < 10 ? "0" + d : d;
    document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
    document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
    document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
