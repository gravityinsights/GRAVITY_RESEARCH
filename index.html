<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

:root {
    --gold: #d4af37;
    --gold-muted: rgba(212, 175, 55, 0.2);
    --bg-black: #050505;
}

html { scroll-behavior: smooth; }

body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-black);
    color: #ffffff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
}

.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}
.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 9999;
    top: 0;
    left: 0;
    background-color: rgba(5, 5, 5, 0.98);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    padding-top: 80px;
    border-right: 1px solid var(--gold-muted);
}

.sidebar.open { width: 350px; }

.sidebar-content {
    padding: 0 40px;
    min-width: 280px;
}

.sidebar a {
    padding: 15px 0;
    text-decoration: none;
    font-size: 16px;
    color: #888;
    display: block;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 10px;
}

.sidebar .close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 32px;
    cursor: pointer;
    color: var(--gold);
}

.menu-label {
    padding: 25px 0 10px;
    font-size: 10px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
}

/* NAV */
.nav {
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu-icon {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 5px;
}

.menu-icon span {
    width: 22px;
    height: 1px;
    background: var(--gold);
}

/* HERO */
.hero {
    text-align: center;
    padding: 140px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 9vw, 75px);
    color: var(--gold);
    margin-bottom: 20px;
}

.hero p {
    color: #999;
    max-width: 600px;
    margin: auto;
}

/* GRID */
.insights-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.preview-card {
    background: rgba(15,15,15,0.7);
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.preview-card:hover {
    border-color: var(--gold);
}

.star {
    cursor: pointer;
    font-size: 18px;
    color: #444;
}

.star.active {
    color: var(--gold);
}

/* COMPARE */
#compare-overlay {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #0a0a0a;
    border-top: 2px solid var(--gold);
    z-index: 9999;
    padding: 30px;
}

</style>
</head>

<body oncontextmenu="return false;">

<div id="mySidebar" class="sidebar">
    <span class="close-btn" id="closeSidebar">&times;</span>

    <div class="sidebar-content">

        <div class="menu-label">Terminal Tools</div>
        <a href="insights.html">Market Insights</a>
        <a href="calc.html">Wealth Projection</a>
        <a href="clock.html">Market Clock</a>

        <div class="menu-label">Advanced Tools</div>
        <a href="watchlist.html">My Favorites / Watchlist</a>

        <div class="menu-label">The Firm</div>
        <a href="vision.html">Our Vision</a>
        <a href="aboutus.html">About Us</a>

    </div>
</div>

<div class="nav">
    <div class="menu-icon" id="menuBtn">
        <span></span><span></span><span></span>
    </div>
    <a href="index.html"><img src="logo.png" height="45"></a>
</div>

<div class="hero reveal">
    <h1>Decoding the Pulse<br>of the Market</h1>
    <p>We synthesize industrial inertia with financial momentum.</p>
</div>

<div class="insights-grid" id="grid"></div>

<script>
let allAssets = [];
let selected = new Set();

function getFavs() {
    return new Set(JSON.parse(localStorage.getItem("favs") || "[]"));
}

function saveFavs(set) {
    localStorage.setItem("favs", JSON.stringify([...set]));
}

function toggleFav(id) {
    let favs = getFavs();
    favs.has(id) ? favs.delete(id) : favs.add(id);
    saveFavs(favs);
    render();
}

async function load() {
    const res = await fetch("https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1");
    const json = await res.json();

    allAssets = (json.sheet1 || []).map((a, i) => ({
        id: a.ticker + "_" + i,
        ...a
    }));

    render();
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const favs = getFavs();

    allAssets.forEach(a => {
        const change = (parseFloat(a.change) * 100).toFixed(2);

        grid.innerHTML += `
        <div class="preview-card">
            <div style="display:flex;justify-content:space-between;">
                <span style="color:var(--gold)">${a.ticker}</span>
                <span class="star ${favs.has(a.id) ? 'active' : ''}" onclick="toggleFav('${a.id}')">★</span>
            </div>

            <h3 style="color:var(--gold)">${a.company}</h3>

            <div>
                ₹${Number(a.price).toLocaleString('en-IN')}
                <span style="color:${change >= 0 ? '#00ff88' : '#ff4444'}">
                    ${change >= 0 ? '▲' : '▼'} ${change}%
                </span>
            </div>

            <p style="color:#777;font-size:12px">
                ${(a.analysis || "").slice(0,80)}...
            </p>
        </div>`;
    });
}

/* SIDEBAR */
document.getElementById("menuBtn").onclick = () =>
    document.getElementById("mySidebar").classList.add("open");

document.getElementById("closeSidebar").onclick = () =>
    document.getElementById("mySidebar").classList.remove("open");

document.addEventListener("click", e => {
    const sb = document.getElementById("mySidebar");
    if (!sb.contains(e.target) && !e.target.closest(".menu-icon")) {
        sb.classList.remove("open");
    }
});

load();
</script>

</body>
</html>
