<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root 
{
    --gold: #d4af37;
    --bg: #050505;
}

body 
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

/* planets */
.planet 
{
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 0;
}

.p1 
{ 
    width:140px;
    height:140px;
    top:20%;
    left:10%;
    background:radial-gradient(circle,rgba(212,175,55,0.25),transparent); 
}

.p2 
{ 
    width:100px;
    height:100px;
    bottom:15%;
    right:12%;
    background:radial-gradient(circle,rgba(212,175,55,0.2),transparent); 
}

.p3 
{ 
    width:80px;
    height:80px;
    top:60%;
    left:30%;
    background:radial-gradient(circle,rgba(212,175,55,0.18),transparent); 
}

/* sidebar */
.sidebar 
{
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
}

.sidebar.open 
{ 
    width: 280px; 
}

.sidebar-content 
{ 
    padding: 0 30px; 
}

.menu-label 
{
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
}

.sidebar a 
{
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    cursor: pointer;
}

.sidebar a:hover 
{
    color: var(--gold);
    padding-left: 10px;
}

/* nav */
.nav 
{
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.menu-icon span 
{
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
    cursor: pointer;
}

/* hero */
.hero 
{
    text-align: center;
    padding: 140px 20px;
}

.hero h1 
{
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: var(--gold);
}

.hero p 
{
    max-width: 600px;
    margin: 20px auto;
    color: #999;
}

/* button */
.btn 
{
    padding: 12px 25px;
    margin: 10px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover 
{
    background: var(--gold);
    color: black;
}

/* layer fix */
body > * 
{ 
    position: relative; 
    z-index: 1; 
}

/* scrollbar */
::-webkit-scrollbar 
{
    width: 6px;
}

::-webkit-scrollbar-track 
{
    background: #000;
}

::-webkit-scrollbar-thumb 
{
    background: linear-gradient(180deg, #d4af37, #b8962e);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover 
{
    background: #ffd700;
}

html 
{
    scrollbar-width: thin;
    scrollbar-color: #d4af37 #000;
}

</style>
</head>

<body>

<!-- planets -->
<div class="planet p1"></div>
<div class="planet p2"></div>
<div class="planet p3"></div>

<!-- sidebar -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-content">

        <div class="menu-label">Advanced Tools</div>
        <a onclick="go('calc.html')">Wealth Calculators</a>
        <a onclick="go('clock.html')">Market Clock</a>

        <div class="menu-label">Our Firm</div>
        <a onclick="go('aboutus.html')">About Us</a>
        <a onclick="go('vision.html')">Our Vision</a>

    </div>
</div>

<!-- nav -->
<div class="nav">
    <div class="menu-icon" onclick="openMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <img src="logo.png" height="40">
</div>

<!-- hero -->
<div class="hero">

    <h1>Markets Aren’t Random.</h1>

    <p>
        They move with patterns, logic, and hidden forces.
        We decode them into clarity.
    </p>

    <button class="btn" onclick="go('aboutus.html')">Explore</button>

</div>

<script>

/* menu */
function openMenu()
{
    document.getElementById("sidebar").classList.toggle("open");
}

/* nav */
function go(page)
{
    window.location.href = page;
}

/* gravity */
const planets = document.querySelectorAll(".planet");

document.addEventListener("mousemove", e => 
{
    planets.forEach(p => 
    {
        const rect = p.getBoundingClientRect();

        const px = rect.left + rect.width / 2;
        const py = rect.top + rect.height / 2;

        const dx = e.clientX - px;
        const dy = e.clientY - py;

        const dist = Math.sqrt(dx * dx + dy * dy);

        let strength = p.classList.contains("p1") ? 0.03 : 
                       p.classList.contains("p2") ? 0.06 : 0.12;

        if (dist < 200) 
        {
            const force = (200 - dist) / 200;

            p.style.transform = `translate(${dx * strength}px, ${dy * strength}px) scale(${1 + force * 0.3})`;
            p.style.boxShadow = `0 0 ${60 * force}px rgba(212,175,55,0.7)`;
        } 
        else 
        {
            p.style.transform = "translate(0,0) scale(1)";
            p.style.boxShadow = "none";
        }
    });
});

</script>

</body>
</html>
