<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #ffffff;
    overflow-x: hidden;
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(20px);
    transition: 0.5s;
    padding-top: 60px;
    border-right: 1px solid #d4af37;
}
.sidebar-content { padding: 0 32px; }
.sidebar a {
    padding: 12px 0;
    font-size: 18px;
    color: #9ca3af;
    display: block;
    text-decoration: none;
}
.sidebar a:hover { color: #d4af37; padding-left: 10px; }

.close-btn {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 36px;
    cursor: pointer;
    color: #d4af37;
}

/* NAV */
.nav {
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
}

.menu-icon span {
    width: 6px;
    height: 6px;
    background: #d4af37;
    display: block;
    margin: 4px;
}

/* HERO */
.hero { text-align: center; padding: 120px 20px; }
.hero h1 { font-size: 60px; color: #d4af37; }

/* LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-core {
    position: relative;
    width: 150px;
    height: 150px;
}

.ring {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.2);
    animation: spin 2s linear infinite;
}

.text {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    color: #d4af37;
}

@keyframes spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
}

.loader-hide {
    opacity: 0;
    transition: 0.8s ease;
    pointer-events: none;
}

/* PARTICLES */
.particles {
    position: absolute;
    width: 100%;
    height: 100%;
}

.particles span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #d4af37;
    border-radius: 50%;
    animation: attract 2s linear infinite;
}

@keyframes attract {
    0% { transform: scale(1); }
    100% { transform: translate(-50px,-50px) scale(0); opacity:0; }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-core">
        <div class="ring"></div>
        <div class="particles"></div>
        <div class="text">gRaviTy</div>
    </div>
</div>

<!-- SIDEBAR -->
<div id="mySidebar" class="sidebar">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <div class="sidebar-content">
        <a href="markettata.html">Tata Analysis</a>
        <a href="insights.html">General Insights</a>
        <a href="calc.html">Wealth Projection</a>
        <a href="clock.html">Market Clock</a>
        <a href="vision.html">Our Vision</a>
        <a href="aboutus.html">About Us</a>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="openNav()" class="menu-icon">
        <span></span><span></span><span></span>
    </div>
    <img src="logo.png" width="140">
</div>

<!-- HERO -->
<div class="hero">
    <h1>Decoding the Pulse of the Market</h1>
</div>

<script>
    // SIDEBAR NAVIGATION LOGIC
    function openNav() {
        document.getElementById("mySidebar").style.width = "350px";
    }

    function closeNav() {
        document.getElementById("mySidebar").style.width = "0";
    }

    // COUNTDOWN TIMER LOGIC
    const targetDate = new Date("April 25, 2026 00:00:00").getTime();

    const countdownInterval = setInterval(function() {
        const now = new Date().getTime();
        const timeLeft = targetDate - now;

        const d = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
        const h = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((timeLeft % (1000 * 60)) / 1000);

        if (document.getElementById("days")) {
            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        if (timeLeft < 0) {
            clearInterval(countdownInterval);
            document.querySelector(".countdown-box").innerHTML = "<p style='color:#d4af37'>BUSINESS FULLY LAUNCHED</p>";
        }
    }, 1000);

    // Sidebar close on outside click
    window.onclick = function(event) {
        if (event.target == document.getElementById("mySidebar")) {
            closeNav();
        }
    }

    // LOADER + PARTICLES
    window.addEventListener("load", function() {

        const loader = document.getElementById("loader");

        if (sessionStorage.getItem("visited")) {
            loader.style.display = "none";
        } else {
            sessionStorage.setItem("visited", "true");

            setTimeout(() => {
                loader.classList.add("loader-hide");

                setTimeout(() => {
                    loader.style.display = "none";
                }, 800);

            }, 1800);
        }

        const particleContainer = document.querySelector(".particles");

        if (particleContainer) {
            for (let i = 0; i < 25; i++) {
                let p = document.createElement("span");

                p.style.left = Math.random() * 100 + "%";
                p.style.top = Math.random() * 100 + "%";
                p.style.animationDelay = Math.random() * 2 + "s";

                particleContainer.appendChild(p);
            }
        }

    });
</script>

</body>
</html>
