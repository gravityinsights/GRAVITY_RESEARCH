<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gRaviTy Research</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(15px);
            overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding-top: 60px;
            border-right: 1px solid #d4af37;
        }

        .sidebar-content { padding: 0 32px; min-width: 280px; }

        .sidebar a {
            padding: 12px 0;
            text-decoration: none;
            font-size: 18px;
            color: #9ca3af;
            display: block;
            transition: 0.3s;
            font-weight: 300;
        }

        .sidebar a:hover { color: #d4af37; padding-left: 10px; }

        .sidebar .close-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 36px;
            cursor: pointer;
            color: #d4af37;
        }

        .menu-label {
            padding: 20px 0 10px 0;
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* --- MINI TOOL BOX --- */
        .mini-tool {
            background: rgba(212, 175, 55, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            margin-top: 10px;
        }

        /* --- NAV --- */
        .nav {
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f1f1f;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-icon span {
            display: block;
            width: 6px;
            height: 6px;
            background-color: #d4af37;
            border-radius: 50%;
            transition: 0.3s;
        }

        .nav img { width: 140px; }

        /* HERO & CONTENT */
        .hero { text-align: center; padding: 100px 20px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 48px; color: #d4af37; margin-bottom: 15px; }
        
        .btn {
            margin: 10px;
            padding: 14px 32px;
            background: transparent;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            text-decoration: none;
            display: inline-block;
            transition: 0.4s;
        }

        .btn:hover { background: #d4af37; color: black; }

        .footer { text-align: center; padding: 40px; font-size: 12px; color: #6b7280; border-top: 1px solid #1f1f1f; }
        
        .gold-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,175,55,0.1), transparent 70%); top: 10%; left: -5%; }
    </style>
</head>

<body>

    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        
        <div class="sidebar-content">
            <div class="menu-label">Market Insights</div>
            <a href="markettata.html">Tata Analysis</a>
            <a href="insights.html">General Insights</a>
            
            <div class="menu-label">Advanced Tools</div>
            <a href="tradingview.html">Live Market Charts</a>
            <a href="calc.html">Wealth Calculator</a>
            
            <div class="menu-label">Quick Preview</div>
            <div class="mini-tool">
                <p style="font-size: 12px; color: #9ca3af; margin: 0;">Market Ticker</p>
                <div style="height: 40px; overflow: hidden; margin-top: 5px;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                    {
                      "symbols": [{ "proName": "NSE:NIFTY", "title": "Nifty 50" }],
                      "colorTheme": "dark",
                      "isTransparent": true,
                      "displayMode": "adaptive",
                      "locale": "en"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div class="gold-orb"></div>

    <div class="nav">
        <div class="menu-icon" onclick="openNav()">
            <span></span><span></span><span></span>
        </div>
        <img src="logo.png" alt="gRaviTy Logo">
        <div style="width: 30px;"></div> 
    </div>

    <div class="hero">
        <h1>Understanding Market Forces</h1>
        <p style="color: #9ca3af; max-width: 600px; margin: 0 auto 30px auto;">Professional market research, simplified for the modern investor.</p>
        <a href="insights.html" class="btn">Start Exploring</a>
    </div>

    <div class="footer">
        © 2026 gRaviTy Research | All Rights Reserved
    </div>

    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "350px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
        window.onclick = function(event) {
            if (event.target == document.getElementById("mySidebar")) { closeNav(); }
        }
    </script>
</body>
</html>
