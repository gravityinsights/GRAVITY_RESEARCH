<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

    :root {
        --gold: #d4af37;
        --gold-muted: rgba(212, 175, 55, 0.2);
        --bg-black: #050505;
    }

    html { scroll-behavior: smooth; }

    body {
        margin: 0; padding: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg-black);
        color: #ffffff;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        cursor: default;
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* --- SIDEBAR --- */
    .sidebar {
        height: 100%; width: 0; position: fixed; z-index: 9999;
        top: 0; left: 0; background-color: rgba(5, 5, 5, 0.98);
        backdrop-filter: blur(20px); overflow-x: hidden;
        transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        padding-top: 80px; border-right: 1px solid var(--gold-muted);
    }

    .sidebar.open { width: 350px; }

    .sidebar-content { padding: 0 40px; min-width: 280px; }

    .sidebar a {
        padding: 15px 0;
        text-decoration: none;
        font-size: 16px;
        color: #888;
        display: block;
        transition: 0.3s;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar a:hover { color: var(--gold); padding-left: 10px; }

    .sidebar .close-btn {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 32px;
        cursor: pointer;
        color: var(--gold);
    }

    .menu-label {
        padding: 25px 0 10px 0;
        font-size: 10px;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
    }

    /* NAV */
    .nav {
        padding: 20px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(15px);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .menu-icon {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 5px;
    }

    .menu-icon span {
        display: block;
        width: 22px;
        height: 1px;
        background-color: var(--gold);
    }

    .nav img {
        height: 45px;
        width: auto;
    }
</style>
</head>

<body>

<div id="mySidebar" class="sidebar">
    <span class="close-btn" id="closeSidebar">&times;</span>

    <div class="sidebar-content">

        <div class="menu-label">Terminal Tools</div>
        <a href="insights.html">Market Insights</a>
        <a href="calc.html">Wealth Projection</a>
        <a href="clock.html">Market Clock</a>

        <!-- ONLY ADDITION DONE -->
        <div class="menu-label">Advanced Tools</div>
        <a href="watchlist.html">My Favorites / Watchlist</a>

        <div class="menu-label">The Firm</div>
        <a href="vision.html">Our Vision</a>
        <a href="aboutus.html">About Us</a>

    </div>
</div>

<div class="nav">
    <div class="menu-icon" id="menuBtn">
        <span></span><span></span><span></span>
    </div>

    <a href="index.html">
        <img src="logo.png" alt="Logo">
    </a>
</div>

<script>
const sidebar = document.getElementById("mySidebar");
const menuBtn = document.getElementById("menuBtn");
const closeBtn = document.getElementById("closeSidebar");

menuBtn.onclick = () => sidebar.classList.add("open");
closeBtn.onclick = () => sidebar.classList.remove("open");

document.onclick = (e) => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove("open");
    }
};
</script>

</body>
</html>
