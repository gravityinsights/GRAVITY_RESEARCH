<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

/* PLANETS */
.planet {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 0;
}

.p1 {
    width: 140px;
    height: 140px;
    top: 20%;
    left: 10%;
    background: radial-gradient(circle, rgba(212,175,55,0.25), transparent);
}
.p2 {
    width: 100px;
    height: 100px;
    bottom: 15%;
    right: 12%;
    background: radial-gradient(circle, rgba(212,175,55,0.2), transparent);
}
.p3 {
    width: 80px;
    height: 80px;
    top: 60%;
    left: 30%;
    background: radial-gradient(circle, rgba(212,175,55,0.18), transparent);
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(212,175,55,0.2);
}
.sidebar.open { width: 280px; }

.sidebar-content { padding: 0 30px; }

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.7;
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
}
.sidebar a:hover {
    color: var(--gold);
    padding-left: 10px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu-icon {
    cursor: pointer;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

.nav img {
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 140px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: var(--gold);
}

.hero p {
    max-width: 600px;
    margin: 20px auto;
    color: #999;
}

/* SECTION */
.section {
    text-align: center;
    margin-top: 100px;
    padding: 0 20px;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
}

.section p {
    max-width: 600px;
    margin: 20px auto;
    color: #999;
}

/* TOOL CARDS */
.tool-grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 40px;
}

.tool-card {
    border: 1px solid #222;
    padding: 20px;
    width: 200px;
    transition: 0.3s;
}
.tool-card:hover {
    border-color: var(--gold);
    transform: translateY(-5px);
}

/* BUTTON */
.btn {
    padding: 12px 25px;
    margin: 10px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.3s;
}
.btn:hover {
    background: var(--gold);
    color: black;
    box-shadow: 0 0 20px rgba(212,175,55,0.3);
}

/* TRANSITION */
#transition {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.blackhole {
    width: 0;
    height: 0;
    background: radial-gradient(circle, black 40%, transparent);
    border-radius: 50%;
}

.whitehole {
    position: absolute;
    width: 0;
    height: 0;
    background: radial-gradient(circle, white, transparent);
    border-radius: 50%;
    opacity: 0;
}

@keyframes suckIn {
    to { transform: scale(0.2); opacity: 0; }
}
@keyframes blackExpand {
    to { width: 2000px; height: 2000px; }
}
@keyframes whiteBurst {
    0% { opacity: 1; }
    100% { width: 2000px; height: 2000px; opacity: 0; }
}

body > * { position: relative; z-index: 1; }
</style>
</head>

<body>

<!-- PLANETS -->
<div class="planet p1"></div>
<div class="planet p2"></div>
<div class="planet p3"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<span class="close-btn" onclick="closeMenu()">&times;</span>
<div class="sidebar-content">
<div class="menu-label">Advanced Tools</div>
<a onclick="go('calc.html')">Wealth Calculators</a>
<a onclick="go('clock.html')">Market Clock</a>
<div class="menu-label">Our Firm</div>
<a onclick="go('aboutus.html')">About Us</a>
<a onclick="go('vision.html')">Our Vision</a>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="menu-icon" onclick="openMenu()">
<span></span><span></span><span></span>
</div>
<img src="logo.png" height="40" onclick="go('index.html')">
</div>

<!-- HERO -->
<div class="hero">
<h1>Markets Aren’t Random.</h1>
<p>They move with patterns, logic, and hidden forces.</p>
<button class="btn" onclick="go('calc.html')">Wealth Tools</button>
</div>

<!-- SECTION -->
<div class="section">
<h2>What We Do</h2>
<p>We simplify complex market behavior into actionable insights.</p>
</div>

<!-- TOOLS -->
<div class="section">
<h2>Tools That Build Wealth</h2>
<div class="tool-grid">
<div class="tool-card"><h4>Projection</h4></div>
<div class="tool-card"><h4>SIP Engine</h4></div>
<div class="tool-card"><h4>Inflation</h4></div>
</div>
</div>

<!-- TRANSITION -->
<div id="transition">
<div class="blackhole"></div>
<div class="whitehole"></div>
</div>

<script>

// SIDEBAR
function openMenu(){sidebar.classList.add("open")}
function closeMenu(){sidebar.classList.remove("open")}
document.addEventListener("click",e=>{
if(!sidebar.contains(e.target)&&!e.target.closest(".menu-icon"))closeMenu()
})

// NAV TRANSITION
function go(page){
let t=document.getElementById("transition")
let b=t.querySelector(".blackhole")
let w=t.querySelector(".whitehole")

t.style.display="flex"
document.body.style.animation="suckIn 0.5s forwards"

setTimeout(()=>b.style.animation="blackExpand 0.5s forwards",200)
setTimeout(()=>w.style.animation="whiteBurst 0.4s forwards",700)
setTimeout(()=>window.location.href=page,900)
}

// GRAVITY
const planets=document.querySelectorAll(".planet")
document.addEventListener("mousemove",e=>{
planets.forEach(p=>{
let rect=p.getBoundingClientRect()
let px=rect.left+rect.width/2
let py=rect.top+rect.height/2
let dx=e.clientX-px
let dy=e.clientY-py
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<250){
let force=(250-dist)/250

// size-based weight
let size=rect.width
let speed=size>120?0.03:size>90?0.06:0.12

p.style.transform=`translate(${dx*speed}px,${dy*speed}px) scale(${1+force*0.25})`
p.style.boxShadow=`0 0 ${50*force}px rgba(212,175,55,0.7)`
}else{
p.style.transform="translate(0,0) scale(1)"
p.style.boxShadow="none"
}
})
})

</script>

</body>
</html>
