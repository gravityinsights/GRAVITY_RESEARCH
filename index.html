<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root
{
    --gold: #d4af37;
    --bg: #050505;
}

body
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* subtle gradient bg */
body::before
{
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(212,175,55,0.06), transparent 50%);
    z-index: 0;
}

/* sidebar */
.sidebar
{
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    overflow-x: hidden;
    transition: 0.3s ease;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar.open
{
    width: 260px;
}

.sidebar-content
{
    padding: 0 30px;
}

.menu-label
{
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    opacity: 0.6;
}

.sidebar a
{
    display: block;
    padding: 14px 0;
    color: #777;
    text-decoration: none;
    transition: 0.2s;
}

.sidebar a:hover
{
    color: var(--gold);
}

/* overlay */
.overlay
{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 900;
}

.overlay.show
{
    opacity: 1;
    pointer-events: all;
}

/* nav */
.nav
{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
}

.menu-icon span
{
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 5px 0;
}

/* hero */
.hero
{
    text-align: center;
    padding: 120px 20px 100px;
    max-width: 800px;
    margin: auto;
}

.hero h1
{
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 6vw, 64px);
    color: var(--gold);
    line-height: 1.2;
}

.hero p
{
    margin-top: 20px;
    color: #aaa;
    font-size: clamp(14px, 2.5vw, 18px);
    line-height: 1.7;
}

/* button */
.btn
{
    margin-top: 30px;
    padding: 12px 26px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.25s;
}

.btn:hover
{
    background: var(--gold);
    color: black;
}

/* subtle fade-in */
.fade
{
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards;
}

.fade.delay
{
    animation-delay: 0.2s;
}

.fade.delay2
{
    animation-delay: 0.4s;
}

@keyframes fadeUp
{
    to
    {
        opacity: 1;
        transform: translateY(0);
    }
}

/* layering */
body > *
{
    position: relative;
    z-index: 1;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #d4af37; }

html
{
    scrollbar-width: thin;
    scrollbar-color: #d4af37 #000;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- sidebar -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-content">

        <div class="menu-label">Advanced Tools</div>
        <a onclick="go('calc.html')">Wealth Calculators</a>
        <a onclick="go('clock.html')">Market Clock</a>

        <div class="menu-label">Our Firm</div>
        <a onclick="go('aboutus.html')">About Us</a>
        <a onclick="go('vision.html')">Our Vision</a>

    </div>

</div>

<!-- nav -->
<div class="nav">

    <div class="menu-icon" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <img src="logo.png" height="36">

</div>

<!-- hero -->
<div class="hero">

    <h1 class="fade">Markets Aren’t Random.</h1>

    <p class="fade delay">
        They move with patterns, logic, and hidden forces.
        We decode them into clarity.
    </p>

    <button class="btn fade delay2" onclick="go('aboutus.html')">
        Explore
    </button>

</div>

<script>

/* menu */
function toggleMenu()
{
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* nav */
function go(page)
{
    window.location.href = page;
}

</script>

</body>
</html>
