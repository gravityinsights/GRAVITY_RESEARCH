<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            cursor: default;
        }

        .nav {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav img { height: 45px; width: auto; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            z-index: 10;
        }

        /* --- CONTROLS --- */
        .controls {
            margin-bottom: 50px;
            text-align: center;
        }

        #searchBar {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 12px 20px;
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            outline: none;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #222;
            color: #666;
            padding: 6px 15px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active { border-color: var(--gold); color: var(--gold); }

        /* --- CARDS --- */
        .insight-card {
            background: rgba(15,15,15,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            margin-bottom: 30px;
            transition: 0.4s;
            display: none;
        }

        .insight-card.visible { display: block; animation: fadeInUp 0.6s forwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .company-name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); }
        
        /* --- AI VERDICT BADGE --- */
        .verdict-badge {
            font-size: 9px;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 10px;
            display: inline-block;
        }

        .analysis-content { line-height: 1.8; color: #bbb; font-size: 15px; }

        .gold-orb { position: fixed; border-radius: 50%; filter: blur(140px); pointer-events: none; z-index: 1; opacity: 0.15; }
        .orb1 { width: 500px; height: 500px; background: var(--gold); top: -10%; left: -10%; }
        .orb2 { width: 400px; height: 400px; background: var(--gold); bottom: -5%; right: -5%; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="nav">
    <div style="width: 22px;"></div>
    <a href="index.html"><img src="logo.png" alt="Logo"></a>
    <div style="width: 22px;"></div> 
</div>

<div class="container">
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search Company" onkeyup="filterData()">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setFilter('all', this)">All Sectors</button>
            <button class="filter-btn" onclick="setFilter('tech', this)">Tech</button>
            <button class="filter-btn" onclick="setFilter('finance', this)">Finance</button>
            <button class="filter-btn" onclick="setFilter('consumer', this)">Consumer</button>
        </div>
    </div>

    <div id="insights-container">
        <div style="text-align: center; color: var(--gold);">SYNCHRONIZING WITH TERMINAL...</div>
    </div>
</div>

<script>
    let allData = [];
    let activeFilter = 'all';

    async function loadData() {
        const SHEETY_URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1'; 
        try {
            const response = await fetch(SHEETY_URL);
            const data = await response.json();
            allData = data.sheet1;
            filterData();
        } catch (e) { console.error("Sync Failed"); }
    }

    function filterData() {
        const container = document.getElementById('insights-container');
        const search = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';

        allData.forEach(item => {
            const matchesSearch = item.company.toLowerCase().includes(search) || item.ticker.toLowerCase().includes(search);
            const matchesFilter = activeFilter === 'all' || item.sector?.toLowerCase() === activeFilter;

            if (matchesSearch && matchesFilter) {
                const card = document.createElement('div');
                card.className = 'insight-card visible';
                
                const change = (parseFloat(item.change) * 100).toFixed(2);
                const isBullish = parseFloat(change) >= 0;
                const vColor = isBullish ? 'rgba(0, 255, 136, 0.1)' : 'rgba(255, 68, 68, 0.1)';
                const vText = isBullish ? '#00ff88' : '#ff4444';

                card.innerHTML = `
                    <div class="verdict-badge" style="background: ${vColor}; color: ${vText}">
                        AI SENSE: ${item.verdict || 'ANALYZING'}
                    </div>
                    <div class="card-header">
                        <div class="company-name">${item.company}</div>
                        <div style="text-align: right;">
                            <span style="font-size: 18px;">₹${item.price.toLocaleString('en-IN')}</span>
                            <div style="color: ${vText}; font-size: 11px;">${isBullish ? '▲' : '▼'} ${change}%</div>
                        </div>
                    </div>
                    <div class="analysis-content">${item.analysis}</div>
                `;
                container.appendChild(card);
            }
        });
    }

    function setFilter(f, btn) {
        activeFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterData();
    }

    loadData();
    
    document.onkeydown = function(e) {
        if (e.keyCode === 123 || ((e.ctrlKey || e.metaKey) && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73))) return false;
    };
</script>
</body>
</html>
