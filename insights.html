<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights | gRaviTy Research</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav {
            padding: 20px 0;
            display: flex;
            justify-content: center; /* Keeps logo centered */
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        /* LOGO WRAP */
        .logo-wrap {
            position: relative;
            display: inline-block;
        }

        .logo {
            width: 140px;
            position: relative;
            z-index: 2;
            transition: 0.4s;
            display: block;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212,175,55,0.3), transparent 70%);
            transform: translate(-50%, -50%);
            filter: blur(30px);
            z-index: 1;
            animation: logoPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        .logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px #d4af37);
        }

        /* --- SIDEBAR (Hidden but kept in case of links) --- */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            overflow-x: hidden;
            transition: 0.5s;
            border-right: 1px solid #1f1f1f;
        }

        /* --- CONTENT SECTION --- */
        .section {
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .section h1 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .card {
            background: #0a0a0a;
            padding: 30px;
            margin: 20px auto;
            border-radius: 12px;
            max-width: 600px;
            border: 1px solid #1f1f1f;
            color: #d1d5db;
            transition: 0.3s;
        }

        .card:hover {
            border: 1px solid #d4af37;
            transform: translateY(-5px);
        }

        .btn {
            margin-top: 40px;
            padding: 12px 30px;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #d4af37;
            color: black;
        }

        /* --- ANIMATED ORBS --- */
        .gold-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,175,55,0.15), transparent); animation: move1 20s infinite; }
        .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(212,175,55,0.1), transparent); animation: move2 25s infinite; }

        @keyframes move1 { 0%, 100% {top:10%;left:10%;} 50% {top:60%;left:70%;} }
        @keyframes move2 { 0%, 100% {bottom:10%;right:10%;} 50% {top:20%;left:80%;} }
        @keyframes logoPulse { 0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); } }
    </style>
</head>

<body>

    <div class="nav">
        <div class="logo-wrap">
            <a href="index.html"><img src="logo.png" class="logo" alt="gRaviTy Logo"></a>
            <div class="logo-glow"></div>
        </div>
    </div>

    <div class="gold-orb orb1"></div>
    <div class="gold-orb orb2"></div>

    <div class="section">
        <h1>Market Insights</h1>

        <div class="card">
            <h3>Stock Market Basics</h3>
            <p>Markets move due to supply, demand, and investor psychology.</p>
        </div>

        <div class="card">
            <h3>Trend Analysis</h3>
            <p>Identifying patterns helps predict future price movements.</p>
        </div>

        <div class="card">
            <h3>Business Breakdown</h3>
            <p>Understanding revenue, profit, and growth is key to analysis.</p>
        </div>

        <button class="btn" onclick="window.location.href='index.html'">
            ← Back to Home
        </button>
    </div>

</body>
</html>
