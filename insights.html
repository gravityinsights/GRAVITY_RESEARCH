<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

/* NAV */
.nav {
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #1f1f1f;
}

.nav img {
    width: 180px;
}

/* SECTION */
.section {
    padding: 60px 20px;
    text-align: center;
}

.section h1 {
    font-family: 'Playfair Display', serif;
    color: #d4af37;
}

/* CARD */
.card {
    background: #0a0a0a;
    padding: 20px;
    margin: 20px auto;
    border-radius: 12px;
    max-width: 600px;
    border: 1px solid #1f1f1f;
    color: #d1d5db;
    transition: 0.3s;
}

.card:hover {
    border: 1px solid #d4af37;
    transform: scale(1.02);
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 10px 20px;
    border: 1px solid #d4af37;
    background: transparent;
    color: #d4af37;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    color: black;
}

/* ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: screen;
}

.orb1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(212,175,55,0.25), transparent);
    animation: move1 18s linear infinite;
}

.orb2 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(212,175,55,0.2), transparent);
    animation: move2 25s linear infinite;
}

.orb3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,175,55,0.15), transparent);
    animation: move3 30s linear infinite;
}

/* ORB PATHS */
@keyframes move1 {
    0% {top:10%;left:10%;}
    25% {top:70%;left:20%;}
    50% {top:60%;left:80%;}
    75% {top:20%;left:70%;}
    100% {top:10%;left:10%;}
}

@keyframes move2 {
    0% {top:80%;left:80%;}
    25% {top:20%;left:70%;}
    50% {top:30%;left:10%;}
    75% {top:70%;left:20%;}
    100% {top:80%;left:80%;}
}

@keyframes move3 {
    0% {top:50%;left:0%;}
    25% {top:10%;left:40%;}
    50% {top:60%;left:60%;}
    75% {top:30%;left:90%;}
    100% {top:50%;left:0%;}
}

/* FIX LAYERING */
body > * {
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<!-- ORBS -->
<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>
<div class="gold-orb orb3"></div>

<!-- NAV -->
<div class="nav">
    <img src="logo.png">
</div>

<!-- CONTENT -->
<div class="section">
    <h1>Market Insights</h1>

    <div class="card">
        <h3>Stock Market Basics</h3>
        <p>Markets move due to supply, demand, and investor psychology.</p>
    </div>

    <div class="card">
        <h3>Trend Analysis</h3>
        <p>Identifying patterns helps predict future price movements.</p>
    </div>

    <div class="card">
        <h3>Business Breakdown</h3>
        <p>Understanding revenue, profit, and growth is key to analysis.</p>
    </div>

    <button class="btn" onclick="window.location.href='index.html'">
        ← Back to Home
    </button>
</div>

</body>
</html>
