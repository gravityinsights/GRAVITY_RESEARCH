<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gRaviTy Research | Understanding Market Forces</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --gold-muted: rgba(212, 175, 55, 0.2);
            --bg-black: #050505;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            cursor: default;
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* SIDEBAR */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(20px); overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding-top: 80px; border-right: 1px solid var(--gold-muted);
        }
        .sidebar.open { width: 350px; }
        .sidebar-content { padding: 0 40px; min-width: 280px; }

        .sidebar a {
            padding: 15px 0; text-decoration: none; font-size: 16px;
            color: #888; display: block; transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar a:hover { color: var(--gold); padding-left: 10px; }

        .sidebar .close-btn {
            position: absolute; top: 20px; right: 25px;
            font-size: 32px; cursor: pointer; color: var(--gold);
        }

        .menu-label {
            padding: 25px 0 10px 0; font-size: 10px;
            color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; font-weight: 600;
        }

        /* NAV */
        .nav {
            padding: 20px 40px; display: flex;
            align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-icon span {
            width: 22px; height: 1px;
            background-color: var(--gold);
        }

        .nav img { height: 45px; }

        /* SEARCH + FILTER BAR */
        .top-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            width: 300px;
            padding: 12px;
            background: rgba(15,15,15,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
            border-radius: 6px;
        }

        .toggle-btn {
            padding: 12px 16px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            border-radius: 6px;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 140px 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display';
            font-size: clamp(38px, 9vw, 75px);
            color: var(--gold);
        }

        .hero p { color: #999; }

        /* GRID */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .preview-card {
            background: rgba(15,15,15,0.7);
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .preview-card:hover {
            border-color: var(--gold);
        }

        .star {
            cursor: pointer;
            font-size: 18px;
            color: #444;
        }

        .star.active {
            color: var(--gold);
        }

        .comp-check { accent-color: var(--gold); }

        .hidden { display: none !important; }
    </style>
</head>

<body>

<div class="nav">
    <div class="menu-icon" id="menuBtn"><span></span><span></span><span></span></div>
    <img src="logo.png">
</div>

<!-- CONTROLS -->
<div class="top-controls">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search ticker or company">
    </div>
    <button class="toggle-btn" id="favToggle">Show Favorites</button>
</div>

<div class="hero">
    <h1>Decoding the Pulse<br>of the Market</h1>
    <p>We synthesize market momentum into structured intelligence.</p>
</div>

<div class="insights-grid" id="grid"></div>

<script>
let allAssets = [];
let selectedIdx = [];
let showFav = false;

function getFavs() {
    return JSON.parse(localStorage.getItem("favs") || "[]");
}

function toggleFav(index) {
    let favs = getFavs();

    if (favs.includes(index)) {
        favs = favs.filter(i => i !== index);
    } else {
        favs.push(index);
    }

    localStorage.setItem("favs", JSON.stringify(favs));
    render(document.getElementById("searchInput").value.toLowerCase());
}

async function loadData() {
    const res = await fetch('https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1');
    const json = await res.json();
    allAssets = json.sheet1;
    render("");
}

function render(filter = "") {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let data = allAssets;

    if (filter) {
        data = data.filter(a =>
            (a.ticker || "").toLowerCase().includes(filter) ||
            (a.company || "").toLowerCase().includes(filter)
        );
    }

    if (showFav) {
        const favs = getFavs();
        data = data.filter((_, i) => favs.includes(i));
    }

    data.forEach((item, i) => {
        const change = (parseFloat(item.change) * 100).toFixed(2);
        const favs = getFavs();
        const isFav = favs.includes(i);

        grid.innerHTML += `
            <div class="preview-card">
                <div style="display:flex;justify-content:space-between;">
                    <span style="color:var(--gold)">${item.ticker}</span>
                    <span class="star ${isFav ? 'active' : ''}" onclick="toggleFav(${i})">
                        ★
                    </span>
                </div>

                <h3 style="color:var(--gold)">${item.company}</h3>

                <div>
                    ₹${Number(item.price).toLocaleString('en-IN')}
                    <span style="color:${change >= 0 ? '#00ff88' : '#ff4444'}">
                        ${change >= 0 ? '▲' : '▼'} ${change}%
                    </span>
                </div>

                <p style="color:#777;font-size:12px">
                    ${(item.analysis || "").slice(0,80)}...
                </p>
            </div>
        `;
    });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e => {
    render(e.target.value.toLowerCase());
});

/* FAVORITES TOGGLE */
document.getElementById("favToggle").onclick = () => {
    showFav = !showFav;
    document.getElementById("favToggle").innerText =
        showFav ? "Show All" : "Show Favorites";
    render(document.getElementById("searchInput").value.toLowerCase());
};

loadData();
</script>

</body>
</html>
