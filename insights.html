<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            
            /* --- LOCKDOWN: UNCOPYABLE --- */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            cursor: default;
        }

        /* --- NAVIGATION --- */
        .nav {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav img { height: 45px; width: auto; }

        /* --- CONTAINER --- */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: clamp(32px, 8vw, 42px);
            text-align: center;
            margin-bottom: 50px;
        }

        /* --- DYNAMIC CARD STYLE --- */
        .insight-card {
            background: rgba(15,15,15,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            margin-bottom: 30px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
        }

        .insight-card.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .insight-card:hover {
            border-color: var(--gold);
            background: rgba(20,20,20,0.95);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 15px;
        }

        .company-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--gold);
        }

        .price-info { text-align: right; }
        .live-price { font-size: 18px; display: block; color: #fff; font-weight: 200; }
        .pct-change { font-size: 12px; font-weight: 600; margin-top: 5px; display: block; }

        .analysis-content {
            line-height: 1.9;
            color: #bbb;
            font-size: 16px;
            font-weight: 300;
        }

        /* --- FOOTER NAV --- */
        .back-nav { text-align: center; margin-top: 60px; padding-bottom: 80px; }
        .back-link { 
            color: var(--gold); 
            text-decoration: none; 
            font-size: 11px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border: 1px solid var(--gold); 
            padding: 14px 28px; 
            transition: 0.4s; 
        }
        .back-link:hover { background: var(--gold); color: #000; }

        /* --- LOADING SYSTEM --- */
        #loader { 
            text-align: center; 
            color: var(--gold); 
            letter-spacing: 5px; 
            font-size: 10px; 
            margin-top: 100px; 
            text-transform: uppercase;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* --- BACKGROUND ORBS --- */
        .gold-orb { position: fixed; border-radius: 50%; filter: blur(140px); pointer-events: none; z-index: 1; opacity: 0.15; }
        .orb1 { width: 500px; height: 500px; background: var(--gold); top: -10%; left: -10%; }
        .orb2 { width: 400px; height: 400px; background: var(--gold); bottom: -5%; right: -5%; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="nav">
    <div style="width: 22px;"></div>
    <a href="index.html"><img src="logo.png" alt="gRaviTy Logo"></a>
    <div style="width: 22px;"></div> 
</div>

<div class="container">
    <h1>Market Insights</h1>
    <div id="loader">Establishing Encrypted Connection...</div>
    <div id="insights-container"></div>

    <div class="back-nav">
        <a href="index.html" class="back-link">Return to Command Center</a>
    </div>
</div>

<script>
    async function loadInsights() {
        // --- YOUR LIVE API ENDPOINT ---
        const SHEETY_URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1'; 

        try {
            const response = await fetch(SHEETY_URL);
            const data = await response.json();
            const container = document.getElementById('insights-container');
            const loader = document.getElementById('loader');

            // Hide loader once data is fetched
            loader.style.display = 'none';

            // Accessing the 'sheet1' object from your Sheety response
            const rows = data.sheet1;

            rows.forEach((report, index) => {
                // Formatting values for a clean UI
                const priceVal = report.price ? report.price.toLocaleString('en-IN') : "0.00";
                const rawChange = report.change ? parseFloat(report.change) * 100 : 0;
                const changeDisplay = rawChange.toFixed(2);
                const color = rawChange >= 0 ? '#00ff88' : '#ff4444';
                const sign = rawChange >= 0 ? '+' : '';

                const card = document.createElement('div');
                card.className = 'insight-card';
                
                // Staggered entrance animation
                card.style.transitionDelay = (index * 0.15) + 's';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="company-name">${report.company || 'Loading Asset...'}</div>
                        <div class="price-info">
                            <span class="live-price">₹${priceVal}</span>
                            <span class="pct-change" style="color: ${color}">${sign}${changeDisplay}%</span>
                        </div>
                    </div>
                    <div class="analysis-content">
                        ${report.analysis || 'Awaiting deep-dive synchronization from the terminal...'}
                    </div>
                `;

                container.appendChild(card);
                
                // Slight delay to trigger the fade-in transform
                setTimeout(() => card.classList.add('loaded'), 50);
            });

        } catch (error) {
            console.error("Connection Error:", error);
            document.getElementById('loader').innerText = "TERMINAL OFFLINE. CHECK DATA SOURCE.";
        }
    }

    // Initialize the feed
    loadInsights();

    // --- SECURITY LOCKDOWN ---
    document.onkeydown = function(e) {
        // Block F12, Ctrl+U, Ctrl+S, Ctrl+Shift+I (Windows/Mac)
        if (
            e.keyCode === 123 || 
            ((e.ctrlKey || e.metaKey) && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) ||
            (e.ctrlKey && e.shiftKey && (e.keyCode === 74 || e.keyCode === 67))
        ) {
            return false;
        }
    };
</script>
</body>
</html>
