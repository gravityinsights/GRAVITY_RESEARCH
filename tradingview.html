<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Terminal | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');
        
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PREMIUM HEADER --- */
        .header {
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        
        .btn-exit {
            color: #d4af37;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-exit:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* --- TERMINAL LAYOUT --- */
        .terminal-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
        }

        #chart-area { 
            flex: 3; 
            border-right: 1px solid #1f1f1f;
            animation: slideLeft 0.8s ease-out;
        }

        #quote-area { 
            flex: 1; 
            min-width: 320px; 
            background: #050505;
            animation: slideRight 0.8s ease-out;
        }

        /* --- SMOOTH ANIMATIONS --- */
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 1024px) {
            .terminal-container { flex-direction: column; overflow-y: auto; }
            #quote-area { height: 400px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <img src="logo.png" alt="gRaviTy" style="width: 110px;">
            <div style="width: 1px; height: 25px; background: #333; margin: 0 10px;"></div>
            <span style="font-family: 'Playfair Display'; color: #d4af37; letter-spacing: 1px;">MARKET TERMINAL</span>
        </div>
        <a href="index.html" class="btn-exit">← Exit Terminal</a>
    </div>

    <div class="terminal-container">
        <div id="chart-area">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_main" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "NSE:TATAMOTORS",
                    "interval": "D",
                    "timezone": "Asia/Kolkata",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "withdateranges": true,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true, // THIS ENABLES THE SEARCH BAR
                    "details": true,
                    "hotlist": true,
                    "calendar": true,
                    "show_popup_button": true,
                    "popup_width": "1000",
                    "popup_height": "650",
                    "container_id": "tradingview_main"
                });
                </script>
            </div>
        </div>

        <div id="quote-area">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                    "colorTheme": "dark",
                    "dateRange": "12M",
                    "showChart": true,
                    "locale": "en",
                    "width": "100%",
                    "height": "100%",
                    "largeChartUrl": "",
                    "isTransparent": true,
                    "showSymbolLogo": true,
                    "tabs": [
                        {
                            "title": "Watchlist",
                            "symbols": [
                                { "s": "NSE:TATAMOTORS" },
                                { "s": "NSE:NIFTY" },
                                { "s": "NSE:RELIANCE" },
                                { "s": "NSE:HDFCBANK" },
                                { "s": "NSE:INFY" }
                            ]
                        }
                    ]
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>
